<!DOCTYPE html>

<html>
<head>
  <title>Web VT for AIR</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #020617;
      padding: 10px;
      font-size: 13px;
      color: #94a3b8;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    tr:hover { background: #334155; cursor: pointer; }

    .vtx { color: #facc15; font-weight: bold; }
    .active { background: #2563eb !important; }

    .recorder {
      background: #020617;
      padding: 15px;
      border-radius: 6px;
    }

    .vu-container {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
    }

    #vuBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      border-radius: 5px;
    }

    select {
      background: #020617;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 15px;
      min-width: 220px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    audio { width: 100%; margin-top: 10px; }
  </style>

</head>

<body>

<h1>🎙️ Web VT for AIR</h1>

<div style="margin-bottom:5px; color:#94a3b8; font-size:13px;">
  Select Log
</div>
<select id="logSelect"></select>
<select id="hourSelect" style="display:none;"></select>

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Title</th>
      <th>Artist</th>
      <th>Intro</th>
      <th>End</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let log = [];
let filteredLog = [];
let selectedIndex = null;
let currentHour = null;

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

const tableBody = document.querySelector("#logTable tbody");

function formatIntro(seconds) {
  if (!seconds || isNaN(seconds)) return "";
  return ":" + parseInt(seconds).toString().padStart(2, "0");
}

function formatHour(hourStr) {
  let hour = parseInt(hourStr, 10);
  const suffix = hour >= 12 ? "PM" : "AM";
  hour = hour % 12 || 12;
  return `${hour} ${suffix}`;
}

async function loadLogs() {
  const res = await fetch("https://web-vt-api.miup3p.easypanel.host/logs");
  const files = await res.json();

  const select = document.getElementById("logSelect");
  select.innerHTML = "<option>Select a log...</option>";

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  select.onchange = () => {
    if (select.value !== "Select a log...") {
      loadSelectedLog(select.value);
    }
  };
}

async function loadSelectedLog(filename) {
  const res = await fetch(`https://web-vt-api.miup3p.easypanel.host/logs/${filename}`);
  const text = await res.text();

  processASC(text);

  document.getElementById("hourSelect").style.display = "inline-block";
}

function processASC(text) {
  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          intro: parseInt(parts[10]) || 0,
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          cart: parts[4],
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  buildHourDropdown();
  filterByHour(log[0].time.split(":")[0]);
}

function buildHourDropdown() {
  const hours = [...new Set(log.map(r => r.time.split(":")[0]))].sort();

  const select = document.getElementById("hourSelect");
  select.innerHTML = "";

  hours.forEach(hour => {
    const opt = document.createElement("option");
    opt.value = hour;
    opt.textContent = formatHour(hour);
    select.appendChild(opt);
  });

  currentHour = hours[0];
  select.value = currentHour;

  select.onchange = () => {
    currentHour = select.value;
    filterByHour(currentHour);
  };
}

function filterByHour(hour) {
  filteredLog = log.filter(row => row.time.startsWith(hour));
  selectedIndex = null;
  renderTable();
}

function renderTable() {
  tableBody.innerHTML = "";

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>${row.type === "VTX" ? row.title + " (" + row.cart + ")" : row.title}</td>
      <td>${row.artist || ""}</td>
      <td>${formatIntro(row.intro)}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    if (i === selectedIndex && row.type === "VTX") {
      const nextSong = filteredLog[i + 1];
      const introTime = nextSong?.intro || 0;

      const recorderRow = document.createElement("tr");
      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            🎙️ Recording for Cart: ${row.cart}<br><br>

            <button onclick="startRecording(${introTime})">Start</button>
            <button onclick="stopRecording()">Stop</button>

            <button id="uploadBtn" onclick="uploadToAIR()" disabled>
              Upload to AIR
            </button>

            <div id="countdown">⏱️ ${formatIntro(introTime)}</div>

            <div class="vu-container">
              <div id="vuBar"></div>
            </div>

            <div id="status"></div>
            <audio id="player" controls></audio>
          </div>
        </td>
      `;
      tableBody.appendChild(recorderRow);
    }
  });
}

function selectRow(i) {
  if (filteredLog[i].type !== "VTX") return;
  selectedIndex = i;
  renderTable();
}

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);

  audioChunks = [];

  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };

  mediaRecorder.start();

  document.getElementById("status").textContent = "Recording...";
}

function stopRecording() {
  if (!mediaRecorder) return;

  mediaRecorder.stop();

  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(audioChunks, { type: "audio/webm" });
    audioChunks = [];

    const audioURL = URL.createObjectURL(recordedBlob);
    document.getElementById("player").src = audioURL;

    document.getElementById("status").textContent = "Ready to upload";

    const uploadBtn = document.getElementById("uploadBtn");
    if (uploadBtn) uploadBtn.disabled = false;
  };
}

async function uploadToAIR() {
  if (!recordedBlob) return;

  const row = filteredLog[selectedIndex];
  const status = document.getElementById("status");
  const btn = document.getElementById("uploadBtn");

  const fileName = `${row.cart}.webm`;

  const formData = new FormData();
  formData.append("file", recordedBlob, fileName);
  formData.append("cart", row.cart);

  status.textContent = `Uploading ${fileName} to AIR...`;
  btn.disabled = true;

  try {
    const res = await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error("Upload failed");

    status.textContent = "✅ Uploaded to AIR";
    btn.textContent = "Uploaded ✓";

  } catch (err) {
    console.error(err);
    status.textContent = "❌ Upload failed";
    btn.disabled = false;
  }
}

loadLogs();
</script>

</body>
</html>
