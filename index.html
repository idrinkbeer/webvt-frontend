<!DOCTYPE html>
<html>
<head>
  <title>Web VT</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 6px; }
    tr:hover { background: #eee; cursor: pointer; }
    .active { background: #cce5ff; }
  </style>
</head>
<body>
  <h1>Web VT for AIR</h1>

  <input type="file" id="fileInput" accept=".asc"><br><br>

  <table id="logTable">
    <thead>
      <tr>
        <th>Song</th>
        <th>Artist</th>
        <th>Intro</th>
        <th>End</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <br>

  <h3 id="currentTrack">No track selected</h3>

  <button onclick="startRecording()">Start VT</button>
  <button onclick="stopRecording()">Stop VT</button>

  <p id="status"></p>
  <audio id="player" controls></audio>

  <script>
    let log = [];
    let selectedIndex = null;
    let mediaRecorder;
    let audioChunks = [];

    const tableBody = document.querySelector("#logTable tbody");
    const status = document.getElementById("status");
    const currentTrack = document.getElementById("currentTrack");

    // 🔹 Load ASC file
    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      const text = await file.text();

      log = text.split("\n").map(line => {
        const parts = line.split(",");
        return {
          song: parts[0] || "",
          artist: parts[1] || "",
          intro: parts[2] || "",
          end: parts[3] || ""
        };
      }).filter(row => row.song);

      renderTable();
    });

    function renderTable() {
      tableBody.innerHTML = "";

      log.forEach((row, i) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${row.song}</td>
          <td>${row.artist}</td>
          <td>${row.intro}</td>
          <td>${row.end}</td>
        `;

        tr.onclick = () => selectTrack(i);
        tableBody.appendChild(tr);
      });
    }

    function selectTrack(i) {
      selectedIndex = i;

      document.querySelectorAll("tr").forEach(r => r.classList.remove("active"));
      tableBody.children[i].classList.add("active");

      const track = log[i];
      currentTrack.innerText = `${track.artist} - ${track.song}`;
    }

    async function startRecording() {
      if (selectedIndex === null) {
        status.innerText = "❌ Select a track first";
        return;
      }

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);

      audioChunks = [];

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

      mediaRecorder.start();
      status.innerText = "🎙️ Recording...";
    }

    function stopRecording() {
      mediaRecorder.stop();

      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: "audio/wav" });
        const url = URL.createObjectURL(blob);

        document.getElementById("player").src = url;

        const track = log[selectedIndex];

        const fileName = `${track.artist}_${track.song}.wav`
          .replace(/[^a-z0-9]/gi, "_");

        const formData = new FormData();
        formData.append("file", blob, fileName);

        const res = await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        status.innerText = "✅ Uploaded: " + data.file;
      };
    }
  </script>
</body>
</html>
