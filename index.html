<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #020617;
      padding: 10px;
      font-size: 13px;
      color: #94a3b8;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    tr:hover { background: #334155; cursor: pointer; }

    .vtx { color: #facc15; font-weight: bold; }
    .active { background: #2563eb !important; }

    .recorder {
      background: #020617;
      padding: 15px;
      border-radius: 6px;
    }

    .vu-container {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
    }

    #vuBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      border-radius: 5px;
    }

    select {
      background: #020617;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 15px;
      min-width: 220px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    audio { width: 100%; margin-top: 10px; }
  </style>
</head>

<body>

<h1>🎙️ Web VT for AIR</h1>

<!-- LOG DROPDOWN -->
<div style="margin-bottom:5px; color:#94a3b8; font-size:13px;">
  Select Log
</div>
<select id="logSelect"></select>

<!-- HOUR DROPDOWN -->
<select id="hourSelect" style="display:none;"></select>

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Title</th>
      <th>Artist</th>
      <th>Intro</th>
      <th>End</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let log = [];
let filteredLog = [];
let selectedIndex = null;
let currentHour = null;

let mediaRecorder;
let audioChunks = [];

let audioContext, analyser, dataArray;

const tableBody = document.querySelector("#logTable tbody");

// FORMAT
function formatIntro(seconds) {
  if (!seconds || isNaN(seconds)) return "";
  return ":" + parseInt(seconds).toString().padStart(2, "0");
}

function formatHour(hourStr) {
  let hour = parseInt(hourStr, 10);
  const suffix = hour >= 12 ? "PM" : "AM";
  hour = hour % 12 || 12;
  return `${hour} ${suffix}`;
}

// =====================
// FTP LOG LOADER
// =====================
async function loadLogs() {
  const res = await fetch("https://web-vt-api.miup3p.easypanel.host/logs");
  const files = await res.json();

  const select = document.getElementById("logSelect");
  select.innerHTML = "<option>Select a log...</option>";

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  select.onchange = () => {
    if (select.value !== "Select a log...") {
      loadSelectedLog(select.value);
    }
  };
}

async function loadSelectedLog(filename) {
  const res = await fetch(`https://web-vt-api.miup3p.easypanel.host/logs/${filename}`);
  const text = await res.text();

  processASC(text);

  document.getElementById("hourSelect").style.display = "inline-block";
}

// =====================
// ASC PROCESSING
// =====================
function processASC(text) {
  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          intro: parseInt(parts[10]) || 0,
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          cart: parts[4], //CART ID NUMBER
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  buildHourDropdown();
  filterByHour(log[0].time.split(":")[0]);
}

// =====================
// HOUR DROPDOWN
// =====================
function buildHourDropdown() {
  const hours = [...new Set(log.map(r => r.time.split(":")[0]))].sort();

  const select = document.getElementById("hourSelect");
  select.innerHTML = "";

  hours.forEach(hour => {
    const opt = document.createElement("option");
    opt.value = hour;
    opt.textContent = formatHour(hour);
    select.appendChild(opt);
  });

  currentHour = hours[0];
  select.value = currentHour;

  select.onchange = () => {
    currentHour = select.value;
    filterByHour(currentHour);
  };
}

// =====================
// FILTER + RENDER
// =====================
function filterByHour(hour) {
  filteredLog = log.filter(row => row.time.startsWith(hour));
  selectedIndex = null;
  renderTable();
}

function renderTable() {
  tableBody.innerHTML = "";

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>${row.type === "VTX" ? row.title + " (" + row.cart + ")" : row.title}</td>
      <td>${row.artist || ""}</td>
      <td>${formatIntro(row.intro)}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    if (i === selectedIndex && row.type === "VTX") {
      const nextSong = filteredLog[i + 1];
      const introTime = nextSong?.intro || 0;

      const recorderRow = document.createElement("tr");
      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            🎙️ Recording for Cart: ${row.cart}<br><br>

            <button onclick="startRecording(${introTime})">Start</button>
            <button onclick="stopRecording()">Stop</button>

            <div id="countdown">⏱️ ${formatIntro(introTime)}</div>

            <div class="vu-container">
              <div id="vuBar"></div>
            </div>

            <div id="status"></div>
            <audio id="player" controls></audio>
          </div>
        </td>
      `;
      tableBody.appendChild(recorderRow);
    }
  });
}

function selectRow(i) {
  if (filteredLog[i].type !== "VTX") return;
  selectedIndex = i;
  renderTable();
}

// =====================
// RECORDING
// =====================
async function startRecording(introTime) {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.start();

  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();
  const source = audioContext.createMediaStreamSource(stream);
  source.connect(analyser);

  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  updateVU();
  startCountdown(introTime);
}

function stopRecording() {
  if (!mediaRecorder) return;

  analyser = null;

  mediaRecorder.stop();

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks);
    const url = URL.createObjectURL(blob);

    document.getElementById("player").src = url;

    const cartId = filteredLog[selectedIndex].cart;
    const fileName = cartId + ".wav";

    const formData = new FormData();
    formData.append("file", blob, fileName);

    await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
      method: "POST",
      body: formData
    });

    document.getElementById("status").innerText = "✅ Uploaded: " + fileName;
  };
}

// =====================
// VU
// =====================
function updateVU() {
  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);
  let avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length;
  let percent = Math.min(100, (avg / 255) * 100);

  const bar = document.getElementById("vuBar");
  if (bar) {
    bar.style.width = percent + "%";
  }

  requestAnimationFrame(updateVU);
}

// =====================
// COUNTDOWN
// =====================
function startCountdown(seconds) {
  let remaining = seconds;
  const el = document.getElementById("countdown");

  const interval = setInterval(() => {
    remaining--;

    if (!el) return clearInterval(interval);

    el.innerText = "⏱️ " + formatIntro(remaining);

    if (remaining <= 5) el.style.color = "#ef4444";
    if (remaining === 0) el.innerText = "🔥 HIT POST";

    if (remaining < 0) clearInterval(interval);
  }, 1000);
}

// INIT
loadLogs();
</script>

</body>
</html>
