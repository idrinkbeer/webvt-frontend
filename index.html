<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #020617;
      padding: 10px;
      font-size: 13px;
      color: #94a3b8;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    tr:hover { background: #334155; cursor: pointer; }

    .vtx { color: #facc15; font-weight: bold; }
    .active { background: #2563eb !important; }

    .recorder {
      background: #020617;
      padding: 15px;
      border-radius: 6px;
    }

    .vu-container {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
    }

    #vuBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      border-radius: 5px;
    }

    #countdown {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    audio { width: 100%; margin-top: 10px; }
  </style>
</head>

<body>

<h1>🎙️ Web VT for AIR</h1>

<input type="file" id="fileInput" accept=".asc"><br><br>

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Title</th>
      <th>Artist</th>
      <th>Intro</th>
      <th>End</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let log = [];
let selectedIndex = null;
let mediaRecorder;
let audioChunks = [];

let audioContext, analyser, dataArray;

const tableBody = document.querySelector("#logTable tbody");

// LOAD ASC
document.getElementById("fileInput").addEventListener("change", async (e) => {
  const text = await e.target.files[0].text();

  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          intro: parts[10],
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  renderTable();
});

function renderTable() {
  tableBody.innerHTML = "";

  log.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>${row.title}</td>
      <td>${row.artist || ""}</td>
      <td>${row.intro ? row.intro + "s" : ""}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    // INLINE RECORDER
    if (i === selectedIndex && row.type === "VTX") {
      const nextSong = log[i + 1];
      const introTime = nextSong?.intro || 0;

      const recorderRow = document.createElement("tr");
      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            🎙️ Voice Track<br><br>

            <button onclick="startRecording(${introTime})">Start</button>
            <button onclick="stopRecording()">Stop</button>

            <div id="countdown">⏱️ ${introTime}s</div>

            <div class="vu-container">
              <div id="vuBar"></div>
            </div>

            <div id="status"></div>
            <audio id="player" controls></audio>
          </div>
        </td>
      `;
      tableBody.appendChild(recorderRow);
    }
  });
}

function selectRow(i) {
  if (log[i].type !== "VTX") return;
  selectedIndex = i;
  renderTable();
}

// START RECORDING
async function startRecording(introTime) {
  const status = document.getElementById("status");

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.start();

  // VU SETUP
  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();
  const source = audioContext.createMediaStreamSource(stream);
  source.connect(analyser);

  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  updateVU();

  // COUNTDOWN
  startCountdown(introTime);

  status.innerText = "🎙️ Recording...";
}

// STOP
function stopRecording() {
  if (!mediaRecorder) return;

  analyser = null;

  mediaRecorder.stop();

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks);
    const url = URL.createObjectURL(blob);

    document.getElementById("player").src = url;

    const vtTime = log[selectedIndex].time;
    const fileName = `VT_${vtTime.replace(/:/g, "-")}.wav`;

    const formData = new FormData();
    formData.append("file", blob, fileName);

    const res = await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("status").innerText = "✅ Uploaded: " + data.file;
  };
}

// VU METER
function updateVU() {
  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  let sum = dataArray.reduce((a,b)=>a+b,0);
  let avg = sum / dataArray.length;
  let percent = Math.min(100, (avg / 255) * 100);

  const bar = document.getElementById("vuBar");
  if (bar) {
    bar.style.width = percent + "%";

    if (percent > 75) bar.style.background = "#ef4444";
    else if (percent > 40) bar.style.background = "#f59e0b";
    else bar.style.background = "#22c55e";
  }

  requestAnimationFrame(updateVU);
}

// COUNTDOWN TIMER
function startCountdown(seconds) {
  let remaining = seconds;
  const el = document.getElementById("countdown");

  const interval = setInterval(() => {
    remaining--;

    if (!el) return clearInterval(interval);

    el.innerText = "⏱️ " + remaining + "s";

    if (remaining <= 5) el.style.color = "#ef4444";

    if (remaining <= 0) {
      el.innerText = "⚠️ TALK ENDED";
      clearInterval(interval);
    }
  }, 1000);
}
</script>

</body>
</html>
