<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>

/* ===== AIR THEME ===== */

body {
  font-family: "Arial Narrow", Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 10px;
  font-weight: bold;
}

/* TABLE = LOG VIEW */
table {
  border-collapse: collapse;
  width: 100%;
  background: #000;
}

/* HEADER */
th {
  background: #001a66;
  color: #fff;
  padding: 8px;
  font-size: 12px;
  text-align: left;
  border: 2px solid #000;
}

/* ROWS */
td {
  padding: 8px;
  border-bottom: 2px solid #000;
}

/* DEFAULT ROW (music) */
tr {
  background: #0b3d91;
}

/* HOVER */
tr:hover {
  filter: brightness(1.2);
  cursor: pointer;
}


/* ON AIR row */
.onair {
  position: relative;
  color: #000;
}

/* ON AIR blinking text */
.onair::after {
  content: "● ON AIR";
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  font-size: 18px;
  font-weight: bold;
  color: #ff0000;

  animation: blink 1s steps(2, start) infinite;
  pointer-events: none;
}

/* selected (voicetrack) row */
.selected {
  outline: 2px solid #ffff00;
}

/* allow gradient to show through cells */
#logTable tbody tr.onair td {
  background: transparent !important;
}

@keyframes blink {
  0%   { opacity: 1; }
  50%  { opacity: 0; }
  100% { opacity: 1; }
}

/* VOICE TRACK */
.vtx {
  background: #800080 !important;
  color: #fff;
}

/* SWEEPER (add this class in your HTML if needed) */
.swp {
  background: #cc0000 !important;
}

/* BUTTONS */
button {
  background: #0033cc;
  border: 2px solid #000;
  padding: 8px 14px;
  margin-right: 10px;
  color: white;
  cursor: pointer;
  font-weight: bold;
  text-transform: uppercase;
}

button:hover {
  background: #0055ff;
}

/* GREEN BUTTON (like AUTO / play) */
.button-green {
  background: #00cc33;
  color: #000;
}

/* RECORDER PANEL */
.recorder {
  background: #001a66;
  padding: 15px;
  border: 2px solid #000;
}

/* VU METER */
.vu-container {
  height: 10px;
  background: #222;
  margin-top: 10px;
}

#vuBar {
  height: 10px;
  width: 0%;
  background: #00cc33;
}

/* AUDIO PLAYER (KEEP FUNCTIONAL, JUST RESTYLE) */
.audio-player {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.progress {
  flex: 1;
  height: 6px;
  background: #222;
  cursor: pointer;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: #00cc33;
}

#time {
  font-size: 12px;
  color: #ccc;
}

/* LOGIN SCREEN (AIR STYLE) */
#loginContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #000;

  display: flex;
  justify-content: center;
  align-items: center;
}

#loginBox {
  background: #001a66;

  border: 2px solid #000;
  text-align: center;
}

#loginBox input {
  width: 200px;
  padding: 8px;
  border: 2px solid #000;
  background: #000;
  color: #fff;
  margin-bottom: 10px;
}

/* LOADER */
.loader {
  border: 4px solid #222;
  border-top: 4px solid #00cc33;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}

#spinner {
  transition: opacity 0.2s ease;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* REMOVE MODERN LOOK */
* {
  border-radius: 0 !important;
  box-shadow: none !important;
}

.air-btn {
  background: #0033cc;
  color: #fff;
  border: 3px solid #000;

  font-family: "Arial Narrow", Arial, sans-serif;
  font-weight: bold;
  text-transform: uppercase;

  padding: 10px 18px;
  min-width: 160px;

  cursor: pointer;

  border-radius: 0;
  box-shadow: none;
}

.air-btn:hover {
  background: #0055ff;
}

.air-btn-green {
  background: #00cc33 !important;
  color: #000 !important;
}

.air-btn-red {
  background: #cc0000 !important;
  color: #fff !important;
}


select {
  background: #0033cc;
  color: #fff;
  border: 2px solid #000;

  font-family: "Arial Narrow", Arial, sans-serif;
  font-weight: bold;

  padding: 6px 30px 6px 10px; /* 👈 extra right padding */
  height: 34px;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  cursor: pointer;

  background-image:
    linear-gradient(45deg, transparent 50%, #fff 50%),
    linear-gradient(135deg, #fff 50%, transparent 50%);

  background-position:
    calc(100% - 12px) center,
    calc(100% - 7px) center;

  background-size: 5px 5px;
  background-repeat: no-repeat;
}

/* spacing between dropdowns */
select + select {
  margin-left: 5px;
}

/* ===== RECORDER AIR LAYOUT ===== */

.recorder {
  background: #001a66;
  border: 2px solid #000;
  padding: 10px;
}

/* TOP BAR */
.recorder-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.rec-title {
  font-size: 14px;
  color: #fff;
}

.rec-controls {
  display: flex;
  gap: 8px;
}

.rec-time {
  font-size: 14px;
  color: #fff;
}

/* WAVEFORM */
.waveform {
  height: 70px;
  margin: 8px 0;
  background: #001a66;
}

/* BOTTOM SECTION */
.rec-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.rec-buttons {
  display: flex;
  gap: 8px;
}

.rec-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 40%;
}

/* tighten buttons */
.recorder .air-btn {
  min-width: 130px;
  padding: 6px 10px;
}

/* progress bar matches AIR */
.recorder .progress {
  flex: 1;
  height: 6px;
  background: #222;
  border: 1px solid #000;
}

.recorder #progressBar {
  height: 100%;
  background: #00cc33;
}

/* status text */
#status {
  margin-top: 6px;
  font-size: 12px;
}

/* VU + TIMER WRAP */
.rec-time-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* SMALL AIR VU METER */
.vu-inline {
  width: 100px;
  height: 10px;
  background: #111;
  border: 1px solid #000;
  position: relative;
}

/* LEVEL BAR */
#vuBar {
  height: 100%;
  width: 0%;
  background: #00cc33;
  transition: width 0.05s linear;
}

#secMarker {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;
  background: red;
  pointer-events: none;
}
    
</style>

// =====================
// LOAD LOGS
// =====================
async function loadLogs() {
  const res = await fetch(`${API_BASE}/logs`, {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const files = await res.json();

  const select = document.getElementById("logSelect");
  select.innerHTML = "";

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  // 🔥 FIX: proper onchange
  select.onchange = () => {
    if (select.value) {
      loadSelectedLog(select.value);
    }
  };

  return files; // 👈 important
}

async function loadSelectedLog(filename) {
  const res = await fetch(`${API_BASE}/logs/${filename}`, {
    headers: { Authorization: "Bearer " + token }
  });
  const text = await res.text();

  processASC(text);
  document.getElementById("hourSelect").style.display = "inline-block";
}

// =====================
// ASC PROCESSING
// =====================
function processASC(text) {
  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          filename: parts[12]?.trim(),
          intro: parseInt(parts[10]) || 0,
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          cart: parts[4],
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  buildHourDropdown();
  filterByHour(log[0].time.split(":")[0]);
}

// =====================
// HOURS
// =====================
function buildHourDropdown() {
  const hours = [...new Set(log.map(r => r.time.split(":")[0]))].sort();

  const select = document.getElementById("hourSelect");
  select.innerHTML = "";

  hours.forEach(hour => {
    const opt = document.createElement("option");
    opt.value = hour;
    opt.textContent = hour;
    select.appendChild(opt);
  });

  currentHour = hours[0];
  select.value = currentHour;

  select.onchange = () => {
    currentHour = select.value;
    filterByHour(currentHour);
  };
}

}, 50);

      // 🔁 Restore previous recording if exists

let previewAudio = null;
let currentPlayBtn = null;

function playSong(filename, btn) {
  const url = `${API_BASE}/audio/song/${encodeURIComponent(filename)}`;

  // 🔴 stop VT preview if playing
  if (isPreviewPlaying) {
    stopPreview();
  }

  // 🔁 clicking same button = stop
  if (currentPlayBtn === btn && previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    btn.textContent = "▶";
    currentPlayBtn = null;
    return;
  }

  // 🎵 stop previous audio
  if (previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    if (currentPlayBtn) {
      currentPlayBtn.textContent = "▶";
    }
  }

  // ▶ start new
  previewAudio = new Audio(url);
  previewAudio.preload = "auto";
  previewAudio.play();

  btn.textContent = "⏹";
  currentPlayBtn = btn;

  previewAudio.onended = () => {
    previewAudio = null;

    if (currentPlayBtn) {
      currentPlayBtn.textContent = "▶";
      currentPlayBtn = null;
    }
  };

  // TRIM SILENCE ON WAV VT
function trimSilence(samples, sampleRate, threshold = 0.01, windowSize = 1024) {
  let start = 0;
  let end = samples.length - 1;

  function rms(startIdx) {
    let sum = 0;
    for (let i = 0; i < windowSize; i++) {
      const s = samples[startIdx + i] || 0;
      sum += s * s;
    }
    return Math.sqrt(sum / windowSize);
  }

  // find start
  for (let i = 0; i < samples.length - windowSize; i += windowSize) {
    if (rms(i) > threshold) {
      start = i;
      break;
    }
  }

  // find end
  for (let i = samples.length - windowSize; i > 0; i -= windowSize) {
    if (rms(i) > threshold) {
      end = i;
      break;
    }
  }

  // padding (keeps natural feel)
  const padding = sampleRate * 0.1; // 100ms

  start = Math.max(0, start - padding);
  end = Math.min(samples.length - 1, end + padding);

  return samples.slice(start, end);
}

    }

    if (recordStage === 1) {
      const { nextSong } = getPrevNextSongs(selectedIndex);

      if (!nextSong) {
        alert("No next song");
        return;
      }

if (songAudio) {
  songAudio.currentTime = 0;
  songAudio.volume = 0.3;
  songAudio.play();
}

      secToneTime = recordSeconds;

      recordStage = 2;
      document.getElementById("recordBtn").textContent = "Stop & Save";
      return;
    }

    if (recordStage === 2) {
      await stopRecording();

      recordStage = 0;
      document.getElementById("recordBtn").textContent = "Start";
    }

  } catch (err) {
    console.error("🔥 RECORD ERROR:", err);
    alert("Recording failed — check console");
  }
}

  
async function startRecording() {
  mediaStream = await navigator.mediaDevices.getUserMedia({
  audio: {
    echoCancellation: false,
    noiseSuppression: false,
    autoGainControl: false
  }
});

  audioContext = new AudioContext();

  const source = audioContext.createMediaStreamSource(mediaStream);

  // 👉 ADD THIS
  const gainNode = audioContext.createGain();
  gainNode.gain.value = 1.2; // adjust as needed

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const processor = audioContext.createScriptProcessor(8192, 1, 1);

  let samples = [];

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    samples.push(new Float32Array(input));
  };

  source.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(processor);
  processor.connect(audioContext.destination);

  window._recorder = { samples, processor };

  updateVU();

  isRecording = true;

  document.getElementById("recordBtn").textContent = "Stop";
  document.getElementById("status").textContent = "Recording...";

  // ⏱ START TIMER
  recordSeconds = 0;

  recordInterval = setInterval(() => {
  recordSeconds++;

    const mins = Math.floor(recordSeconds / 60);
    const secs = (recordSeconds % 60).toString().padStart(2, "0");

    const el = document.getElementById("recordTime");
    if (el) el.textContent = `⏱ ${mins}:${secs}`;
  }, 1000);
}

      playBtn.textContent = "⏸";

      player.pause();
      playBtn.textContent = "▶";
    }
  }
};

    player.ontimeupdate = () => {
      if (!player.duration) return;

      const percent = (player.currentTime / player.duration) * 100;
      progressBar.style.width = percent + "%";

      const minutes = Math.floor(player.currentTime / 60);
      const seconds = Math.floor(player.currentTime % 60)
        .toString()
        .padStart(2, "0");

      timeLabel.textContent = `${minutes}:${seconds}`;
    };

    if (progressContainer) {
      progressContainer.onclick = (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        player.currentTime = percent * player.duration;
      };
    }

  }, 50);
}

function encodeMP3(samples, sampleRate) {
  const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128); // mono, 128 kbps
  const blockSize = 1152;

  let mp3Data = [];

  // convert Float32 → Int16
  const samples16 = new Int16Array(samples.length);
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    samples16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }

  for (let i = 0; i < samples16.length; i += blockSize) {
    const chunk = samples16.subarray(i, i + blockSize);
    const mp3buf = mp3encoder.encodeBuffer(chunk);
    if (mp3buf.length > 0) {
      mp3Data.push(mp3buf);
    }
  }

  const mp3buf = mp3encoder.flush();
  if (mp3buf.length > 0) {
    mp3Data.push(mp3buf);
  }

  return new Blob(mp3Data, { type: "audio/mpeg" });
}
  
async function stopRecording() {
  await new Promise(r => setTimeout(r, 50));
  // ⏱ STOP TIMER
  if (recordInterval) {
    clearInterval(recordInterval);
    recordInterval = null;
  }

  const { samples, processor } = window._recorder;

  processor.disconnect();

  let length = samples.reduce((sum, s) => sum + s.length, 0);
  let flat = new Float32Array(length);

  let offset = 0;
  for (let s of samples) {
    flat.set(s, offset);
    offset += s.length;
  }

  const trimmed = trimSilence(flat, audioContext.sampleRate, 0.01);

  let rawBlob = encodeMP3(trimmed, audioContext.sampleRate);

const row = filteredLog[selectedIndex];
const { nextSong } = getPrevNextSongs(selectedIndex);

// 🎯 CALCULATE DURATION

if (songAudio) {

function updateVU() {
  if (!analyser) return;

  const vu = document.getElementById("vuBar");
  if (!vu) return;

  analyser.getByteFrequencyData(dataArray);

  let sum = dataArray.reduce((a, b) => a + b, 0);
  let avg = sum / dataArray.length;

  let percent = (avg / 255) * 100;

  vu.style.width = percent + "%";

  // 🎯 color zones (AIR style)
  if (percent > 85) {
    vu.style.background = "#ff0000"; // red
  } else if (percent > 60) {
    vu.style.background = "#ffcc00"; // yellow
  } else {
    vu.style.background = "#00cc33"; // green
  }

  requestAnimationFrame(updateVU);
}


function getPrevNextSongs(index) {
  let prevSong = null;
  let nextSong = null;

  for (let i = index - 1; i >= 0; i--) {
    if (filteredLog[i].type === "SONG") {
      prevSong = filteredLog[i];
      break;
    }
  }

  for (let i = index + 1; i < filteredLog.length; i++) {
    if (filteredLog[i].type === "SONG") {
      nextSong = filteredLog[i];
      break;
    }
  }

  return { prevSong, nextSong };
}


async function previewBreak() {
  if (isPreviewPlaying) {
    stopPreview();
    return;
  }

  if (selectedIndex === null) return;

  const { nextSong } = getPrevNextSongs(selectedIndex);
  const row = filteredLog[selectedIndex];

  if (!nextSong) return alert("Missing next song");

  const vtBlob = recordings[row.cart];
  if (!vtBlob) return alert("No VT recorded");

  vtFinished = false;
  songFinished = false;

  if (vtWave) vtWave.stop();
  if (songAudio) {
    songAudio.pause();
    songAudio.currentTime = 0;
  }

  const vtDuration = vtWave.getDuration();

  let songDelay = secToneTime !== null
    ? secToneTime
    : Math.max(0, vtDuration - (nextSong.intro || 0));

  console.log("🎯 Preview delay:", songDelay);

  vtWave.play();

  isPreviewPlaying = true;

  const btn = document.querySelector("button[onclick='previewBreak()']");
  if (btn) btn.textContent = "Stop Preview";

  setTimeout(() => {

      };

  vtWave.once("finish", () => {
    vtFinished = true;
    checkPreviewEnd();
  });

  if (vtWave) vtWave.stop();

  if (songAudio) {
    songAudio.pause();
    songAudio.currentTime = 0;

  songFinished = false;

    isPreviewPlaying = false;

    const btn = document.querySelector("button[onclick='previewBreak()']");
    if (btn) btn.textContent = "Preview Break";

  if (isPreviewPlaying) {

  if (selectedIndex === null) return;

  const row = filteredLog[selectedIndex];

  });
}

async function addID3Tags(blob, row, nextSong, duration, secTone) {
  const mp3 = new Uint8Array(await blob.arrayBuffer());

  function toSynchsafe(size) {
    return [
      (size >> 21) & 0x7f,
      (size >> 14) & 0x7f,
      (size >> 7) & 0x7f,
      size & 0x7f
    ];
  }

  function writeString(view, offset, str) {
    for (let i = 0; i < str.length; i++) {
      view[offset + i] = str.charCodeAt(i);
    }
  }

  function createTXXX(desc, value) {
    const descBytes = new TextEncoder("latin1").encode(desc);
    const valueBytes = new TextEncoder("latin1").encode(value);

    const size = 1 + descBytes.length + 1 + valueBytes.length;

    const frame = new Uint8Array(10 + size);

    // Frame ID
    writeString(frame, 0, "TXXX");

    // Frame size (normal int for v2.3)
    frame[4] = (size >> 24) & 0xff;
    frame[5] = (size >> 16) & 0xff;
    frame[6] = (size >> 8) & 0xff;
    frame[7] = size & 0xff;

    // Flags
    frame[8] = 0;
    frame[9] = 0;

    // Encoding = 0 (ISO-8859-1)
    frame[10] = 0x00;

    // Description
    frame.set(descBytes, 11);

    // Null separator
    frame[11 + descBytes.length] = 0x00;

    // Value
    frame.set(valueBytes, 12 + descBytes.length);

    return frame;
  }

  // 🎯 Build frames
  const frames = [
    createTXXX("Sec Tone", secTone.toString()),
    createTXXX("Category", "AUDIO"),
    createTXXX("No fade", "0")
  ];

  const tagSize = frames.reduce((sum, f) => sum + f.length, 0);

  // 🎯 ID3 header
  const header = new Uint8Array(10);
  writeString(header, 0, "ID3");
  header[3] = 3; // v2.3
  header[4] = 0;
  header[5] = 0;

  const sizeBytes = toSynchsafe(tagSize);
  header[6] = sizeBytes[0];
  header[7] = sizeBytes[1];
  header[8] = sizeBytes[2];
  header[9] = sizeBytes[3];

  // 🎯 Combine
  const final = new Uint8Array(10 + tagSize + mp3.length);

  final.set(header, 0);

  let offset = 10;
  for (const f of frames) {
    final.set(f, offset);
    offset += f.length;
  }

  final.set(mp3, offset);

  return new Blob([final], { type: "audio/mpeg" });
}

currentArtist = (lines[2] || "").toLowerCase();
currentTitle = (lines[3] || "").toLowerCase();

const artist = lines[2];

}, 1000);

function getTodayLogName() {
  const now = new Date();

  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");

  return `${yyyy}${mm}${dd}.ASC`;
}
  


function jumpToCurrentTime() {

  if (!autoFollowEnabled) {
    // 🔥 remove ON AIR highlight when AUTO is OFF
    document.querySelectorAll("#logTable tbody tr").forEach(tr => {
      tr.classList.remove("onair");
    });
    return;
  }

  if (!currentTitle || !currentArtist) {
    console.log("❌ Missing now playing data");
    return;
  }

  const now = new Date();

  const hourSelect = document.getElementById("hourSelect");
  const availableHours = Array.from(hourSelect.options).map(o => o.value);

  const nowHour = now.getHours().toString();
  const startHour = currentSongStart
    ? currentSongStart.getHours().toString()
    : nowHour;

  console.log("🕒 Start hour:", startHour, "| Now hour:", nowHour);
  console.log("🎵 Looking for:", currentTitle, currentArtist);

  // 🎯 STEP 1: pick correct hour
  let selectedHour = availableHours.includes(startHour)
    ? startHour
    : nowHour;

  hourSelect.value = selectedHour;
  currentHour = selectedHour;

  filterByHour(selectedHour);

  // 🎯 STEP 2: find song
  setTimeout(() => {
    const rows = document.querySelectorAll("#logTable tbody tr");

    let found = false;

    rows.forEach(tr => {
      tr.classList.remove("onair");

      const text = tr.textContent.toLowerCase();

      if (
        text.includes(currentTitle) &&
        text.includes(currentArtist)
      ) {
        tr.classList.add("onair");

        tr.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });

        found = true;
      }
    });

    // 🔥 STEP 3: fallback to other hour if not found
    if (!found) {
      const altHour = selectedHour === startHour ? nowHour : startHour;

      if (availableHours.includes(altHour)) {
        console.log("🔄 Trying alternate hour:", altHour);

        hourSelect.value = altHour;
        currentHour = altHour;

        filterByHour(altHour);

        setTimeout(() => {
          jumpToCurrentTime();
        }, 150);
      } else {
        console.log("⚠️ No match found in any hour");
      }
    }

  }, 150);
}

let autoFollowEnabled = true;

function toggleAutoFollow() {
  autoFollowEnabled = !autoFollowEnabled;

  const btn = document.getElementById("autoFollowBtn");

  if (autoFollowEnabled) {
    btn.classList.remove("air-btn-red");
    btn.classList.add("air-btn-green");
    btn.textContent = "AUTO ON";

    // 🔥 immediately sync when turned on
    jumpToCurrentTime();

    btn.classList.remove("air-btn-green");
    btn.classList.add("air-btn-red");
    btn.textContent = "AUTO OFF";

    // 🔥 CLEAR ON AIR + progress visuals
    document.querySelectorAll("#logTable tbody tr").forEach(tr => {
      tr.classList.remove("onair");
      tr.style.background = "";
    });
  }

  console.log("AUTO FOLLOW:", autoFollowEnabled ? "ON" : "OFF");
}
