<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      margin-bottom: 15px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #020617;
      text-align: left;
      padding: 10px;
      font-size: 13px;
      color: #94a3b8;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      font-size: 14px;
    }

    tr:hover {
      background: #334155;
      cursor: pointer;
    }

    .vtx {
      background: #1e293b;
      color: #facc15;
      font-weight: bold;
    }

    .active {
      background: #2563eb !important;
    }

    .recorder {
      background: #020617;
      padding: 15px;
      border-radius: 6px;
      margin-top: 5px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #94a3b8;
    }

    audio {
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<h1>🎙️ Web VT for AIR</h1>

<input type="file" id="fileInput" accept=".asc">

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Title</th>
      <th>Artist</th>
      <th>Intro</th>
      <th>End</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let log = [];
let selectedIndex = null;
let mediaRecorder;
let audioChunks = [];

const tableBody = document.querySelector("#logTable tbody");

// 📂 Load ASC
document.getElementById("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  const text = await file.text();

  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        if (parts.length < 10) return null;

        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          intro: parts[10],
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          title: "VOICE TRACK",
          artist: "",
          intro: "",
          end: ""
        };
      }

      return null;
    })
    .filter(row => row && row.title && !row.title.includes("TIME SYNC"));

  renderTable();
});

function renderTable() {
  tableBody.innerHTML = "";

  log.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>${row.title}</td>
      <td>${row.artist || ""}</td>
      <td>${row.intro ? row.intro + "s" : ""}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    // 🎙️ Inline recorder
    if (i === selectedIndex && row.type === "VTX") {
      const recorderRow = document.createElement("tr");

      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            <strong>🎙️ Voice Track Recorder</strong><br><br>

            <button onclick="startRecording()">Start</button>
            <button onclick="stopRecording()">Stop</button>

            <div id="status">Ready</div>
            <audio id="player" controls></audio>
          </div>
        </td>
      `;

      tableBody.appendChild(recorderRow);
    }
  });
}

function selectRow(i) {
  if (log[i].type !== "VTX") {
    selectedIndex = null;
    renderTable();
    return;
  }

  selectedIndex = i;
  renderTable();
}

async function startRecording() {
  const row = log[selectedIndex];
  if (!row) return;

  const status = document.getElementById("status");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.start();
    status.innerText = "🎙️ Recording...";

  } catch (err) {
    status.innerText = "❌ Mic error";
  }
}

function stopRecording() {
  if (!mediaRecorder) return;

  const status = document.getElementById("status");

  mediaRecorder.stop();

  mediaRecorder.onstop = async () => {
    status.innerText = "Processing...";

    const blob = new Blob(audioChunks, { type: "audio/wav" });
    const url = URL.createObjectURL(blob);

    document.getElementById("player").src = url;

    const vtTime = log[selectedIndex].time;
    const fileName = `VT_${vtTime.replace(/:/g, "-")}.wav`;

    const formData = new FormData();
    formData.append("file", blob, fileName);

    const res = await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    status.innerText = "✅ Uploaded: " + data.file;
  };
}
</script>

</body>
</html>
