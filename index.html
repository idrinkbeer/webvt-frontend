<html>
<head>

  display: flex;

  margin-top: 10px;
}

.audio-player button {

  border: none;
  border-radius: 50%;

  height: 32px;

}

.progress {
  flex: 1;
  height: 6px;
  background: #334155;
  border-radius: 3px;

  cursor: pointer;
}

#progressBar {

}

#time {

}

#app {

}

  justify-content: center;
  align-items: center;

}

#loginBox {

}

}

</head>

<body>

<div id="loginContainer">
  <div id="loginBox">
    <h2>🔐 Web VT Login</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

      <div class="loader"></div>
    </div>
    <div id="loginStatus"></div>

</div>

<div id="app" style="display:none;">
<h1>🎙️ Web VT for AIR</h1>
<button onclick="logout()" style="float:right;">Logout</button>
<select id="logSelect"></select>
<select id="hourSelect" style="display:none;"></select>

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>

<script src="https://unpkg.com/lamejs@1.2.0/lame.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
  
<script>
const STORAGE_KEY = "webvt_token_" + window.location.hostname;
let token = localStorage.getItem(STORAGE_KEY);
let log = [];
let filteredLog = [];
let selectedIndex = null;
let currentHour = null;

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

let isRecording = false;
let audioContext, analyser, dataArray, mediaStream;

let recordSeconds = 0;
let recordInterval = null;
let recordings = {};
let uploaded = {};
let vtWave;
let songWave;
let isPreviewPlaying = false;
let vtFinished = false;
let songFinished = false;
let recordStage = 0; // 0 = idle, 1 = recording, 2 = song fired
let secToneTime = null;

let API_BASE = "https://web-vt-api.miup3p.easypanel.host";

const tableBody = document.querySelector("#logTable tbody");

// =====================
// LOGIN SYSTEM 
// =====================
if (token) {
  document.getElementById("loginContainer").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadLogs();
}
  
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const spinner = document.getElementById("spinner");

  const btn = document.querySelector("#loginBox button");

  // 👉 show spinner + disable button
  spinner.style.display = "block";
  btn.disabled = true;

  const res = await fetch(`${API_BASE}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  if (!res.ok) {
    spinner.style.display = "none";
    btn.disabled = false;
    document.getElementById("loginStatus").textContent = "❌ Login failed";
    return;
  }

  const data = await res.json();
  token = data.token;

  localStorage.setItem(STORAGE_KEY, token);

  document.getElementById("loginContainer").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadLogs();
}

function logout() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
  
// =====================
// UPLOAD VOICETRACK 
// =====================
  async function uploadToAIR() {
  if (!recordedBlob) return;

  const row = filteredLog[selectedIndex];

  const formData = new FormData();
  formData.append("file", recordedBlob, `${row.cart}.mp3`);
  formData.append("cart", row.cart);

  const status = document.getElementById("status");
  const btn = document.getElementById("uploadBtn");

  status.textContent = "Uploading...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    if (!res.ok) throw new Error("Upload failed");

    status.textContent = "✅ VT Uploaded to AIR";
    btn.textContent = "VT Uploaded ✓";
    uploaded[row.cart] = true;

  } catch (err) {
    console.error(err);
    status.textContent = "❌ Upload failed";
    btn.disabled = false;
  }
}
  
// =====================
// LOAD LOGS
// =====================
async function loadLogs() {
  const res = await fetch(`${API_BASE}/logs`, {
    headers: {
      Authorization: "Bearer " + token
    }
  });
  const files = await res.json();

  const select = document.getElementById("logSelect");
  select.innerHTML = "<option>Select a log...</option>";

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  select.onchange = () => {
    if (select.value !== "Select music log...") {
      loadSelectedLog(select.value);
    }
  };
}

async function loadSelectedLog(filename) {
  const res = await fetch(`${API_BASE}/logs/${filename}`, {
    headers: { Authorization: "Bearer " + token }
  });
  const text = await res.text();

  processASC(text);
  document.getElementById("hourSelect").style.display = "inline-block";
}

// =====================
// ASC PROCESSING
// =====================
function processASC(text) {
  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          filename: parts[12]?.trim(),
          intro: parseInt(parts[10]) || 0,
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          cart: parts[4],
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  buildHourDropdown();
  filterByHour(log[0].time.split(":")[0]);
}

// =====================
// HOURS
// =====================
function buildHourDropdown() {
  const hours = [...new Set(log.map(r => r.time.split(":")[0]))].sort();

  const select = document.getElementById("hourSelect");
  select.innerHTML = "";

  hours.forEach(hour => {
    const opt = document.createElement("option");
    opt.value = hour;
    opt.textContent = hour;
    select.appendChild(opt);
  });

  currentHour = hours[0];
  select.value = currentHour;

  select.onchange = () => {
    currentHour = select.value;
    filterByHour(currentHour);
  };
}

// =====================
// TABLE
// =====================
function filterByHour(hour) {
  filteredLog = log.filter(row => row.time.startsWith(hour));
  selectedIndex = null;
  renderTable();
}

function renderTable() {
  tableBody.innerHTML = "";

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>
        ${row.type === "SONG" ? `
          <button onclick="playSong('${row.filename}', this)">▶</button>
        ` : ""}
        ${row.type === "VTX" ? row.title + " (" + row.cart + ")" : row.title}
      </td>
      <td>${row.artist || ""}</td>
      <td>${row.intro || ""}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    if (i === selectedIndex && row.type === "VTX") {
      const recorderRow = document.createElement("tr");

      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            🎙️ Recording for Cart: ${row.cart}<br><br>

            <button id="recordBtn" onclick="toggleRecording()">Start</button>

            <button id="uploadBtn" onclick="uploadToAIR()" disabled>
              Upload to AIR
            </button>

            <div class="vu-container">
              <div id="vuBar"></div>
            </div>

            <div id="status"></div>
            <div id="recordTime">⏱ 0:00</div>
            <div id="vtWaveform" style="margin-top:10px;"></div>
            <div id="songWaveform" style="margin-top:10px;"></div>
            <div class="audio-player">
  <button id="playBtn">▶</button>
  <button onclick="previewBreak()">▶ Preview Break</button>
  <div class="progress">
    <div id="progressBar"></div>
  </div>
  <span id="time">0:00</span>
</div>

<audio id="player"></audio>
          </div>
        </td>
      `;

      tableBody.appendChild(recorderRow);
      // 🎧 Init waveform
setTimeout(() => {
  const vtContainer = document.getElementById("vtWaveform");
  const songContainer = document.getElementById("songWaveform");

  if (!vtContainer || !songContainer) return;

  vtWave = WaveSurfer.create({
    container: "#vtWaveform",
    waveColor: "#facc15",
    progressColor: "#eab308",
    height: 60
  });

  songWave = WaveSurfer.create({
    container: "#songWaveform",
    waveColor: "#334155",
    progressColor: "#22c55e",
    height: 60
  });

  const rowData = filteredLog[selectedIndex];
  if (!rowData) return;

  const { nextSong } = getPrevNextSongs(selectedIndex);

  // 🎙 preload VT
  const saved = recordings[rowData.cart];
  if (saved) {
    vtWave.load(URL.createObjectURL(saved));
  }

  // 🎵 preload next song
  if (nextSong) {
    const songUrl = `${API_BASE}/audio/song/${encodeURIComponent(nextSong.filename)}`;
    songWave.load(songUrl);
  }

  // ✅ Track readiness
  let vtReady = false;
  let songReady = false;

  vtWave.once("ready", () => {
    vtReady = true;
    checkReady();
  });

  songWave.once("ready", () => {
    songReady = true;
    checkReady();
  });

  function checkReady() {
    if (vtReady && songReady) {
      console.log("🔥 Both waveforms ready");
      window.isAudioReady = true;
    }
  }

}, 50);

      // 🔁 Restore previous recording if exists
      const rowData = filteredLog[selectedIndex];
      const saved = recordings[rowData.cart];

      if (saved) {
        const player = document.getElementById("player");

        setupPlayer(player, saved);

        recordedBlob = saved;
        document.getElementById("uploadBtn").disabled = false;
        document.getElementById("status").textContent = "VT Previously recorded";
      }

      // 🔁 Restore upload state
      if (uploaded[rowData.cart]) {
        const btn = document.getElementById("uploadBtn");
        const status = document.getElementById("status");

        btn.textContent = "VT Uploaded ✓";
        btn.disabled = true;
        status.textContent = "✅ Already uploaded";
      }
    }
  });
}


let previewAudio = null;
let currentPlayBtn = null;

function playSong(filename, btn) {
  const url = `${API_BASE}/audio/song/${encodeURIComponent(filename)}`;

  // 🔴 stop VT preview if playing
  if (isPreviewPlaying) {
    stopPreview();
  }

  // 🔁 clicking same button = stop
  if (currentPlayBtn === btn && previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    btn.textContent = "▶";
    currentPlayBtn = null;
    return;
  }

  // 🎵 stop previous audio
  if (previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    if (currentPlayBtn) {
      currentPlayBtn.textContent = "▶";
    }
  }

  // ▶ start new
  previewAudio = new Audio(url);
  previewAudio.preload = "auto";
  previewAudio.play();

  btn.textContent = "⏹";
  currentPlayBtn = btn;

  previewAudio.onended = () => {
    previewAudio = null;

    if (currentPlayBtn) {
      currentPlayBtn.textContent = "▶";
      currentPlayBtn = null;
    }
  };
}


function selectRow(i) {
  if (filteredLog[i].type !== "VTX") return;
  selectedIndex = i;
  renderTable();
}

  // TRIM SILENCE ON WAV VT
function trimSilence(samples, sampleRate, threshold = 0.01, windowSize = 1024) {
  let start = 0;
  let end = samples.length - 1;

  function rms(startIdx) {
    let sum = 0;
    for (let i = 0; i < windowSize; i++) {
      const s = samples[startIdx + i] || 0;
      sum += s * s;
    }
    return Math.sqrt(sum / windowSize);
  }

  // find start
  for (let i = 0; i < samples.length - windowSize; i += windowSize) {
    if (rms(i) > threshold) {
      start = i;
      break;
    }
  }

  // find end
  for (let i = samples.length - windowSize; i > 0; i -= windowSize) {
    if (rms(i) > threshold) {
      end = i;
      break;
    }
  }

  // padding (keeps natural feel)
  const padding = sampleRate * 0.1; // 100ms

  start = Math.max(0, start - padding);
  end = Math.min(samples.length - 1, end + padding);

  return samples.slice(start, end);
}

  
// =====================
// RECORDING
// =====================
async function toggleRecording() {
  // 1️⃣ START RECORDING
  if (recordStage === 0) {
    await startRecording();

    recordStage = 1;
    secToneTime = null;

    document.getElementById("recordBtn").textContent = "▶ Fire Song";
    return;
  }

  // 2️⃣ FIRE SONG (SET MARKER)
  if (recordStage === 1) {
    const { nextSong } = getPrevNextSongs(selectedIndex);

    if (!nextSong) {
      alert("No next song");
      return;
    }

    // play song immediately
    if (songWave) {
      songWave.stop();
      songWave.play();
      songWave.setVolume(0.3);
    }

    // 🎯 MARK THE MOMENT
    secToneTime = recordSeconds;

    console.log("🎯 SecTone marked at:", secToneTime);

    recordStage = 2;
    document.getElementById("recordBtn").textContent = "⏹ Stop & Save";
    return;
  }

  // 3️⃣ STOP + SAVE
  if (recordStage === 2) {
    await stopRecording();

    recordStage = 0;
    document.getElementById("recordBtn").textContent = "Start";
  }
}

  
async function startRecording() {
  mediaStream = await navigator.mediaDevices.getUserMedia({
  audio: {
    echoCancellation: false,
    noiseSuppression: false,
    autoGainControl: false
  }
});

  audioContext = new AudioContext();

  const source = audioContext.createMediaStreamSource(mediaStream);

  // 👉 ADD THIS
  const gainNode = audioContext.createGain();
  gainNode.gain.value = 1.2; // adjust as needed

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const processor = audioContext.createScriptProcessor(8192, 1, 1);

  let samples = [];

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    samples.push(new Float32Array(input));
  };

  source.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(processor);
  processor.connect(audioContext.destination);

  window._recorder = { samples, processor };

  updateVU();

  isRecording = true;

  document.getElementById("recordBtn").textContent = "Stop";
  document.getElementById("status").textContent = "Recording...";

  // ⏱ START TIMER
  recordSeconds = 0;

  recordInterval = setInterval(() => {
  recordSeconds++;

    const mins = Math.floor(recordSeconds / 60);
    const secs = (recordSeconds % 60).toString().padStart(2, "0");

    const el = document.getElementById("recordTime");
    if (el) el.textContent = `⏱ ${mins}:${secs}`;
  }, 1000);
}

function setupPlayer(player, blob) {
  player.src = URL.createObjectURL(blob);

  setTimeout(() => {
    const playBtn = document.getElementById("playBtn");
    const progressBar = document.getElementById("progressBar");
    const timeLabel = document.getElementById("time");
    const progressContainer = document.querySelector(".progress");

    if (!playBtn || !progressBar || !timeLabel) return;

playBtn.onclick = () => {
  if (vtWave) {
    vtWave.playPause();
    playBtn.textContent = vtWave.isPlaying() ? "⏸" : "▶";
  } else {
    if (player.paused) {
      player.play();
      playBtn.textContent = "⏸";
    } else {
      player.pause();
      playBtn.textContent = "▶";
    }
  }
};

    player.ontimeupdate = () => {
      if (!player.duration) return;

      const percent = (player.currentTime / player.duration) * 100;
      progressBar.style.width = percent + "%";

      const minutes = Math.floor(player.currentTime / 60);
      const seconds = Math.floor(player.currentTime % 60)
        .toString()
        .padStart(2, "0");

      timeLabel.textContent = `${minutes}:${seconds}`;
    };

    if (progressContainer) {
      progressContainer.onclick = (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        player.currentTime = percent * player.duration;
      };
    }

  }, 50);
}

function encodeMP3(samples, sampleRate) {
  const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128); // mono, 128 kbps
  const blockSize = 1152;

  let mp3Data = [];

  // convert Float32 → Int16
  const samples16 = new Int16Array(samples.length);
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    samples16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }

  for (let i = 0; i < samples16.length; i += blockSize) {
    const chunk = samples16.subarray(i, i + blockSize);
    const mp3buf = mp3encoder.encodeBuffer(chunk);
    if (mp3buf.length > 0) {
      mp3Data.push(mp3buf);
    }
  }

  const mp3buf = mp3encoder.flush();
  if (mp3buf.length > 0) {
    mp3Data.push(mp3buf);
  }

  return new Blob(mp3Data, { type: "audio/mpeg" });
}
  
async function stopRecording() {
  await new Promise(r => setTimeout(r, 50));
  // ⏱ STOP TIMER
  if (recordInterval) {
    clearInterval(recordInterval);
    recordInterval = null;
  }

  const { samples, processor } = window._recorder;

  processor.disconnect();

  let length = samples.reduce((sum, s) => sum + s.length, 0);
  let flat = new Float32Array(length);

  let offset = 0;
  for (let s of samples) {
    flat.set(s, offset);
    offset += s.length;
  }

  const trimmed = trimSilence(flat, audioContext.sampleRate, 0.01);

  let rawBlob = encodeMP3(trimmed, audioContext.sampleRate);

const row = filteredLog[selectedIndex];
const { nextSong } = getPrevNextSongs(selectedIndex);

// 🎯 CALCULATE DURATION
const duration = trimmed.length / audioContext.sampleRate;

// 🎯 DETERMINE SEC TONE (manual OR fallback)
let secToneSeconds;

if (secToneTime !== null) {
  // ✅ USER SET IT MANUALLY
  secToneSeconds = secToneTime;
  console.log("🎯 Using manual Sec Tone:", secToneSeconds);
} else {
  // 🔁 FALLBACK AUTO LOGIC
  if (nextSong && duration > nextSong.intro) {
    secToneSeconds = duration - nextSong.intro;
  } else {
    secToneSeconds = duration;
  }
  console.log("🤖 Using auto Sec Tone:", secToneSeconds);
}

// 🎯 CONVERT TO SAMPLES (AIR FORMAT)
const secTone = Math.floor(secToneSeconds * 44100);

// 🎯 PASS TO TAGGING
recordedBlob = await addID3Tags(
  rawBlob,
  row,
  nextSong,
  duration,
  secTone
);

  recordings[row.cart] = recordedBlob;

  const player = document.getElementById("player");
  setupPlayer(player, recordedBlob);
     if (vtWave) {
      window.isAudioReady = false;

      vtWave.load(URL.createObjectURL(recordedBlob));

      vtWave.once("ready", () => {
        console.log("🎙 VT ready after recording");
        window.isAudioReady = true;
      });
    }

  document.getElementById("uploadBtn").disabled = false;
  document.getElementById("status").textContent = "Ready to upload";

  mediaStream.getTracks().forEach(track => track.stop());

  if (audioContext) {
    audioContext.close();
    analyser = null;
  }

  isRecording = false;
  document.getElementById("recordBtn").textContent = "Start";

  // 🔊 stop song + restore volume
  if (songWave) {
    songWave.setVolume(1);
    songWave.stop();
  }


}

// =====================
// VU
// =====================
function updateVU() {
  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  let sum = dataArray.reduce((a,b)=>a+b,0);
  let avg = sum / dataArray.length;

  document.getElementById("vuBar").style.width = (avg/255*100) + "%";

  requestAnimationFrame(updateVU);
}


function getPrevNextSongs(index) {
  let prevSong = null;
  let nextSong = null;

  for (let i = index - 1; i >= 0; i--) {
    if (filteredLog[i].type === "SONG") {
      prevSong = filteredLog[i];
      break;
    }
  }

  for (let i = index + 1; i < filteredLog.length; i++) {
    if (filteredLog[i].type === "SONG") {
      nextSong = filteredLog[i];
      break;
    }
  }

  return { prevSong, nextSong };
}


async function previewBreak() {
  // 🔁 toggle
  if (isPreviewPlaying) {
    stopPreview();
    return;
  }

  if (selectedIndex === null) return;

  const { nextSong } = getPrevNextSongs(selectedIndex);
  const row = filteredLog[selectedIndex];

  if (!nextSong) {
    alert("Missing next song");
    return;
  }

  const vtBlob = recordings[row.cart];
  if (!vtBlob) {
    alert("No VT recorded");
    return;
  }

  // 🧼 reset state
  vtFinished = false;
  songFinished = false;

  // 🛑 stop anything already playing
  if (vtWave) vtWave.stop();
  if (songWave) songWave.stop();

const vtDuration = vtWave.getDuration();

// 🎯 USE MANUAL SEC TONE IF AVAILABLE
let songDelay = 0;

if (secToneTime !== null) {
  songDelay = secToneTime;
  console.log("🎯 Preview using manual Sec Tone:", songDelay);
} else {
  // 🔁 fallback to old logic
  const intro = nextSong.intro || 0;

  if (vtDuration > intro) {
    songDelay = vtDuration - intro;
  } else {
    songDelay = vtDuration;
  }

  console.log("🤖 Preview using auto timing:", songDelay);
}

  //console.log("VT:", vtDuration, "Intro:", intro, "Delay:", songDelay);

  // ▶ start VT immediately
  vtWave.play();

  isPreviewPlaying = true;

  const btn = document.querySelector("button[onclick='previewBreak()']");
  if (btn) btn.textContent = "⏹ Stop Preview";

  // ▶ start song
  setTimeout(() => {
    songWave.play();
    songWave.setVolume(0.3);
  }, songDelay * 1000);

  // 🎙 VT finished
  vtWave.once("finish", () => {
    vtFinished = true;
    songWave.setVolume(1);
    checkPreviewEnd();
  });

  // 🎵 SONG finished
  songWave.once("finish", () => {
    songFinished = true;
    checkPreviewEnd();
  });
}


function stopPreview() {
  if (vtWave) vtWave.stop();
  if (songWave) songWave.stop();

  vtFinished = false;
  songFinished = false;

  isPreviewPlaying = false;

  const btn = document.querySelector("button[onclick='previewBreak()']");
  if (btn) btn.textContent = "▶ Preview Break";
}

function checkPreviewEnd() {
  if (vtFinished && songFinished) {
    isPreviewPlaying = false;

    const btn = document.querySelector("button[onclick='previewBreak()']");
    if (btn) btn.textContent = "▶ Preview Break";

    // 🔥 reset AFTER preview
    secToneTime = null;
  }
}

async function addID3Tags(blob, row, nextSong, duration, secTone) {
  try {
    const arrayBuffer = await blob.arrayBuffer();
    const mp3Data = new Uint8Array(arrayBuffer);

    // Create minimal ID3v2.3 header
    const encoder = new TextEncoder();

    const frames = [];

function createTXXX(desc, value) {
  const encoder = new TextEncoder();

  const descBytes = encoder.encode(desc);
  const valueBytes = encoder.encode(value);

  const size = 1 + descBytes.length + 1 + valueBytes.length;

  const frame = new Uint8Array(10 + size);

  // Frame ID
  frame.set(encoder.encode("TXXX"), 0);

  // Size (big endian)
  frame[4] = (size >> 24) & 0xff;
  frame[5] = (size >> 16) & 0xff;
  frame[6] = (size >> 8) & 0xff;
  frame[7] = size & 0xff;

  // Flags
  frame[8] = 0;
  frame[9] = 0;

  // Encoding (0 = ISO-8859-1)
  frame[10] = 0x00;

  // Description
  frame.set(descBytes, 11);

  // Null separator
  frame[11 + descBytes.length] = 0x00;

  // Value
  frame.set(valueBytes, 12 + descBytes.length);

  return frame;
}

    frames.push(createTXXX("Sec Tone", secTone.toString()));
    frames.push(createTXXX("Category", "AUDIO"));
    frames.push(createTXXX("No fade", "0"));

    const tagSize = frames.reduce((sum, f) => sum + f.length, 0);

function toSynchsafe(size) {
  return [
    (size >> 21) & 0x7f,
    (size >> 14) & 0x7f,
    (size >> 7) & 0x7f,
    size & 0x7f
  ];
}

const header = new Uint8Array(10);
header[0] = 0x49; // I
header[1] = 0x44; // D
header[2] = 0x33; // 3
header[3] = 3;    // version 2.3
header[4] = 0;
header[5] = 0;

const sizeBytes = toSynchsafe(tagSize);

header[6] = sizeBytes[0];
header[7] = sizeBytes[1];
header[8] = sizeBytes[2];
header[9] = sizeBytes[3];

    // Combine everything
    const final = new Uint8Array(10 + tagSize + mp3Data.length);

    final.set(header, 0);

    let offset = 10;
    for (let f of frames) {
      final.set(f, offset);
      offset += f.length;
    }

    final.set(mp3Data, offset);

    return new Blob([final], { type: "audio/mpeg" });

  } catch (err) {
    console.error("Tagging failed:", err);
    return blob;
  }
}
