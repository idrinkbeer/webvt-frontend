  <!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>

/* ===== AIR THEME ===== */

body {
  font-family: "Arial Narrow", Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 10px;
  font-weight: bold;
}

/* TABLE = LOG VIEW */
table {
  border-collapse: collapse;
  width: 100%;
  background: #000;
}

/* HEADER */
th {
  background: #001a66;
  color: #fff;
  padding: 8px;
  font-size: 12px;
  text-align: left;
  border: 2px solid #000;
}

/* ROWS */
td {
  padding: 8px;
  border-bottom: 2px solid #000;
}

/* DEFAULT ROW (music) */
tr {
  background: #0b3d91;
}

/* HOVER */
tr:hover {
  filter: brightness(1.2);
  cursor: pointer;
}

/* CURRENT PLAYING */
.active {
  background: #00cc33 !important;
  color: #000;
}

/* VOICE TRACK */
.vtx {
  background: #800080 !important;
  color: #fff;
}

/* SWEEPER (add this class in your HTML if needed) */
.swp {
  background: #cc0000 !important;
}

/* BUTTONS */
button {
  background: #0033cc;
  border: 2px solid #000;
  padding: 8px 14px;
  margin-right: 10px;
  color: white;
  cursor: pointer;
  font-weight: bold;
  text-transform: uppercase;
}

button:hover {
  background: #0055ff;
}

/* GREEN BUTTON (like AUTO / play) */
.button-green {
  background: #00cc33;
  color: #000;
}

/* RECORDER PANEL */
.recorder {
  background: #001a66;
  padding: 15px;
  border: 2px solid #000;
}

/* VU METER */
.vu-container {
  width: 180px;
  height: 18px;              /* 🔥 thicker */
  background: #111;
  border: 2px solid #000;
  position: relative;
}

#vuBar {
  height: 100%;
  width: 0%;
  background: linear-gradient(
    to right,
    #00cc33 0%,
    #00cc33 60%,
    #ffcc00 80%,
    #cc0000 100%
  );
}

/* AUDIO PLAYER (KEEP FUNCTIONAL, JUST RESTYLE) */
.audio-player {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.progress {
  flex: 1;
  height: 6px;
  background: #222;
  cursor: pointer;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: #00cc33;
}

#time {
  font-size: 12px;
  color: #ccc;
}

/* LOGIN SCREEN (AIR STYLE) */
#loginContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #000;

  display: flex;
  justify-content: center;
  align-items: center;
}

#loginBox {
  background: #001a66;
  padding: 25px;
  border: 2px solid #000;
  text-align: center;
}

#loginBox input {
  width: 200px;
  padding: 8px;
  border: 2px solid #000;
  background: #000;
  color: #fff;
  margin-bottom: 10px;
}

/* LOADER */
.loader {
  border: 4px solid #222;
  border-top: 4px solid #00cc33;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}

#spinner {
  transition: opacity 0.2s ease;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* REMOVE MODERN LOOK */
* {
  border-radius: 0 !important;
  box-shadow: none !important;
}

.air-btn {
  background: #0033cc;
  color: #fff;
  border: 3px solid #000;

  font-family: "Arial Narrow", Arial, sans-serif;
  font-weight: bold;
  text-transform: uppercase;

  padding: 10px 18px;
  min-width: 100px;

  cursor: pointer;

  border-radius: 0;
  box-shadow: none;
}

.air-btn:hover {
  background: #0055ff;
}

.air-btn-green {
  background: #00cc33 !important;
  color: #000 !important;
}

.air-btn-red {
  background: #cc0000 !important;
  color: #fff !important;
}

.on-air {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);

  background: #cc0000;
  color: #fff;
  padding: 2px 8px;
  font-size: 11px;

  animation: blink 1s steps(2, start) infinite;
}

@keyframes blink {
  to {
    visibility: hidden;
  }
}

/* make row relative so ON AIR can position */
tr.active {
  position: relative;
}

select {
  background: #0033cc;
  color: #fff;
  border: 2px solid #000;

  font-family: "Arial Narrow", Arial, sans-serif;
  font-weight: bold;

  padding: 6px 30px 6px 10px; /* 👈 extra right padding */
  height: 34px;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  cursor: pointer;

  background-image:
    linear-gradient(45deg, transparent 50%, #fff 50%),
    linear-gradient(135deg, #fff 50%, transparent 50%);

  background-position:
    calc(100% - 12px) center,
    calc(100% - 7px) center;

  background-size: 5px 5px;
  background-repeat: no-repeat;
}



/* ===== AIR LIBRARY WINDOW ===== */
.lib-modal {
  display: none;
  position: fixed;
  top: 120px;
  left: 120px;
  width: 550px;
  height: 600px;
  background: #000;
  border: 3px solid #001a66;
  z-index: 9999;
}

/* HEADER BAR (DRAG HANDLE) */
.lib-header {
  background: #001a66;
  padding: 6px 10px;
  cursor: move;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  border-bottom: 2px solid #000;
}

.lib-header button {
  background: #cc0000;
  border: 2px solid #000;
  color: #fff;
  padding: 2px 8px;
}

/* CONTENT */
.lib-content {
  display: flex;
  flex-direction: column;
  height: calc(100% - 30px);
  padding: 10px;
}

#songSearch {
  margin-bottom: 8px;
  padding: 6px;
  background: #001a66;
  border: 2px solid #000;
  color: #fff;
  font-size: 12px;
}

/* LIST */
#songList {
  flex: 1;
  overflow-y: auto;
  font-size: 12px;
}

#songList li {
  padding: 6px;
  border-bottom: 1px solid #001a66;
}

#songList li:hover {
  background: #0033cc;
}



/* TABLE */
.lib-table {
  flex: 1;
  overflow-y: auto;
  font-size: 12px;
  border: 2px solid #000;
}

.lib-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding: 4px;
  border-bottom: 1px solid #001a66;
}

.lib-head {
  background: #001a66;
  font-weight: bold;
}

.lib-row:hover {
  background: #0033cc;
  cursor: pointer;
}

/* PREVIEW */
.lib-preview {
  border-top: 2px solid #001a66;
  padding-top: 5px;
}

#libWaveform {
  position: relative;
  height: 60px;
}

/* 🔴 RED SEC TONE LINE */
#secMarker {
  position: absolute;
  top: 0;
  width: 2px;
  height: 60px;
  background: red;
  cursor: ew-resize;
  z-index: 10;
}

/* 🟡 INTRO MARKER */
#introMarker {
  position: absolute;
  top: 0;
  width: 2px;
  height: 60px;
  background: yellow;
  cursor: ew-resize;
  z-index: 9;
}

/* spacing between dropdowns */
select + select {
  margin-left: 5px;
}
    

</style>
</head>

<body>

<div id="loginContainer">
<div id="loginBox">

  <img 
    src="https://i.ibb.co/YB7M20Kt/AIR-Radio-Automation-logo-design.png"
    style="
      height:80px;
      margin-bottom:15px;
    "
  >

  <h2 style="margin-top:0;">WEB VT LOGIN</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <div id="spinner" style="display:none; margin-top:10px;">
      <div class="loader"></div>

</div>

<div id="app" style="display:none;">

  <!-- HEADER -->
  <div style="
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 15px;
    position: relative;
  ">

    <!-- LEFT -->
    <div style="display:flex; align-items:center; gap:15px;">
      <img 
        src="https://i.ibb.co/YB7M20Kt/AIR-Radio-Automation-logo-design.png"
        style="height:90px;"
      >

      <select id="logSelect"></select>
      <select id="hourSelect" style="display:none;"></select>
    </div>

<!-- CENTER -->
<div style="flex:1; text-align:center;">
  <div id="clock" style="font-size:28px;"></div>
  <div id="nowPlaying" style="font-size:14px; margin-top:4px;"></div>

<div style="
  width:320px;
  margin:6px auto 0 auto;
  border:2px solid #000;
  background:#001a66;
  padding:2px;
">

  <div id="playBar" style="
    height:10px;
    width:0%;
    background:#00cc33;
  "></div>

</div>

  <div style="
  width:320px;
  margin:2px auto;
  display:flex;
  justify-content:space-between;
  font-size:12px;
">
  <span id="elapsed">0:00</span>
  <span id="remaining">-0:00</span>
</div>
  
</div>

    <!-- RIGHT -->

<div>
  <button class="air-btn" onclick="openLibrary()">Library</button>
  <button id="autoFollowBtn" class="air-btn air-btn-green" onclick="toggleAutoFollow()">AUTO ON</button>
  <button onclick="logout()">Logout</button>
</div>

  </div>

  <!-- TABLE -->
  <table id="logTable">
    <thead>
      <tr>
        <th>Time</th>
        <th>Type</th>
        <th>Title</th>
        <th>Artist</th>
        <th>Intro</th>
        <th>End</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<!-- 🎵 MUSIC LIBRARY MODAL -->
<div id="libraryModal" class="lib-modal">

  <div class="lib-header" id="libHeader">
    <span>MUSIC LIBRARY</span>
    <button onclick="closeLibrary()">X</button>
  </div>

  <div class="lib-content">

    <input type="text" id="songSearch" placeholder="Search..." onkeyup="filterSongs()"/>

    <!-- TABLE -->
    <div class="lib-table">
      <div class="lib-row lib-head">
        <div>Artist</div>
        <div>Title</div>
      </div>

      <div id="songList"></div>
    </div>

    <!-- PREVIEW -->
    <div class="lib-preview">
<div style="position:relative;">
  <div id="libWaveform"></div>
  <div id="introMarker"></div>
  <div id="secMarker"></div>
</div>

<div style="margin-top:5px; font-size:12px;">
  🔴 Sec: <span id="secToneTime">0.00</span>s  
  🟡 Intro: <span id="introTime">0.00</span>s
</div>

      <div style="margin-top:5px;">
        <button onclick="playLibPreview()">PLAY</button>
        <button onclick="playFromIntro()">PLAY INTRO</button>
        <button onclick="playFromSecTone()">PLAY SEGUE</button>
        <button onclick="stopLibPreview()">STOP</button>
        <button onclick="saveSecTone()">SAVE</button>
      </div>
    </div>

  </div>

</div>


<script src="https://unpkg.com/lamejs@1.2.0/lame.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
  
<script>
const STORAGE_KEY = "webvt_token_" + window.location.hostname;
let token = localStorage.getItem(STORAGE_KEY);
let log = [];
let filteredLog = [];
let selectedIndex = null;
let currentHour = null;

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

let isRecording = false;
let audioContext, analyser, dataArray, mediaStream;

let recordSeconds = 0;
let recordInterval = null;
let recordings = {};
let uploaded = {};
let vtWave;
let songWave;
let isPreviewPlaying = false;
let vtFinished = false;
let songFinished = false;
let recordStage = 0; // 0 = idle, 1 = recording, 2 = song fired
let secToneTime = null;
let currentTitle = "";
let currentArtist = "";
let lastTitle = "";
let lastArtist = "";
let previewTimeout = null;
let isVUActive = false;
let isDraggingMarker = false;
let libIntro = 0;
let isDraggingIntro = false;
let libSecTone = 0;


let API_BASE = "https://web-vt-api.miup3p.easypanel.host";

const tableBody = document.querySelector("#logTable tbody");

// =====================
// LOGIN SYSTEM 
// =====================
async function initApp() {
  if (!token) return;

  document.getElementById("loginContainer").style.display = "none";
  document.getElementById("app").style.display = "block";

 const files = await loadLogs();

const todayLog = getTodayLogName();

// 🔥 check if today's log exists
let selectedLog = files.includes(todayLog)
  ? todayLog
  : "DEFAULT.ASC";

console.log("📂 Loading log:", selectedLog);

// set dropdown properly
document.getElementById("logSelect").value = selectedLog;

await loadSelectedLog(selectedLog);

  await loadNowPlaying();

  setTimeout(() => {
    jumpToCurrentTime();
  }, 200);
}

// 🚀 run it
initApp();
  
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const spinner = document.getElementById("spinner");

  const btn = document.querySelector("#loginBox button");

  // 👉 show spinner + disable button
  spinner.style.display = "block";
  btn.disabled = true;

  const res = await fetch(`${API_BASE}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  if (!res.ok) {
    spinner.style.display = "none";
    btn.disabled = false;
    document.getElementById("loginStatus").textContent = "❌ Login failed";
    return;
  }

  const data = await res.json();
  token = data.token;

  localStorage.setItem(STORAGE_KEY, token);

  document.getElementById("loginContainer").style.display = "none";
  document.getElementById("app").style.display = "block";

const files = await loadLogs();

const todayLog = getTodayLogName();

let selectedLog = files.includes(todayLog)
  ? todayLog
  : "DEFAULT.ASC";

console.log("📂 Loading log:", selectedLog);

document.getElementById("logSelect").value = selectedLog;

await loadSelectedLog(selectedLog);

await loadNowPlaying();

setTimeout(() => {
  jumpToCurrentTime();
}, 200);
}

function logout() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
  
// =====================
// UPLOAD VOICETRACK 
// =====================
  async function uploadToAIR() {
  if (!recordedBlob) return;

  const row = filteredLog[selectedIndex];

  const formData = new FormData();
  formData.append("file", recordedBlob, `${row.cart}.mp3`);
  formData.append("cart", row.cart);

  const status = document.getElementById("status");
  const btn = document.getElementById("uploadBtn");

  status.textContent = "Uploading...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    if (!res.ok) throw new Error("Upload failed");

    status.textContent = "✅ VT Uploaded to AIR";
    btn.textContent = "VT Uploaded ✓";
    uploaded[row.cart] = true;

  } catch (err) {
    console.error(err);
    status.textContent = "❌ Upload failed";
    btn.disabled = false;
  }
}
  
// =====================
// LOAD LOGS
// =====================
async function loadLogs() {
  const res = await fetch(`${API_BASE}/logs`, {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const files = await res.json();

  const select = document.getElementById("logSelect");
  select.innerHTML = "";

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  // 🔥 FIX: proper onchange
  select.onchange = () => {
    if (select.value) {
      loadSelectedLog(select.value);
    }
  };

  return files; // 👈 important
}

async function loadSelectedLog(filename) {
  const res = await fetch(`${API_BASE}/logs/${filename}`, {
    headers: { Authorization: "Bearer " + token }
  });
  const text = await res.text();

  processASC(text);
  document.getElementById("hourSelect").style.display = "inline-block";
}

// =====================
// ASC PROCESSING
// =====================
function processASC(text) {
  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          filename: parts[12]?.trim(),
          intro: parseInt(parts[10]) || 0,
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          cart: parts[4],
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  buildHourDropdown();
  filterByHour(log[0].time.split(":")[0]);
}

// =====================
// HOURS
// =====================
function buildHourDropdown() {
  const hours = [...new Set(log.map(r => r.time.split(":")[0]))].sort();

  const select = document.getElementById("hourSelect");
  select.innerHTML = "";

  hours.forEach(hour => {
    const opt = document.createElement("option");
    opt.value = hour;
    opt.textContent = hour;
    select.appendChild(opt);
  });

  currentHour = hours[0];
  select.value = currentHour;

  select.onchange = () => {
    currentHour = select.value;
    filterByHour(currentHour);
  };
}

// =====================
// TABLE
// =====================
function filterByHour(hour) {
  filteredLog = log.filter(row => row.time.startsWith(hour));
  selectedIndex = null;
  renderTable();
}

function renderTable() {
  tableBody.innerHTML = "";

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>
        ${row.type === "SONG" ? `
          <button onclick="playSong('${row.filename}', this)">▶</button>
        ` : ""}
        ${row.type === "VTX" ? row.title + " (" + row.cart + ")" : row.title}
      </td>
      <td>${row.artist || ""}</td>
      <td>${row.intro || ""}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    if (i === selectedIndex && row.type === "VTX") {
      const recorderRow = document.createElement("tr");

      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            Recording VT Cart: ${row.cart}<br><br>

<div style="display:flex; align-items:center; gap:10px; margin-top:10px;">

  <button id="recordBtn" onclick="toggleRecording()">Start</button>

  <button id="uploadBtn" onclick="uploadToAIR()" disabled>
    Upload to AIR
  </button>

  <div class="vu-container">
    <div id="vuBar"></div>
  </div>

</div>

            <div id="status"></div>
            <div id="recordTime">0:00</div>
            <div id="vtWaveform" style="margin-top:5px;"></div>
            <div id="songWaveform" style="margin-top:10px;"></div>
            <div class="audio-player">
<div style="margin-top:10px;">
  <button class="air-btn air-btn-green" onclick="previewVT()">Preview VT</button>
  <button class="air-btn air-btn-green" onclick="previewBreak()">Preview Break</button>
</div>
  <div class="progress">
    <div id="progressBar"></div>
  </div>
  <span id="time">0:00</span>
</div>

<audio id="player"></audio>
          </div>
        </td>
      `;

      tableBody.appendChild(recorderRow);
      // 🎧 Init waveform
setTimeout(() => {
  const vtContainer = document.getElementById("vtWaveform");
  const songContainer = document.getElementById("songWaveform");

  if (!vtContainer || !songContainer) return;

vtWave = WaveSurfer.create({
  container: "#vtWaveform",
  waveColor: "#1e3a8a",       // same as songWave
  progressColor: "#00ff88",   // same green
  cursorColor: "#ffffff",
  barWidth: 2,
  barGap: 1,
  barRadius: 2,
  height: 60,
  normalize: true
});

songWave = WaveSurfer.create({
  container: "#songWaveform",
  waveColor: "#1e3a8a",       // deep blue base
  progressColor: "#00ff88",   // bright green (on-air feel)
  cursorColor: "#ffffff",
  barWidth: 2,
  barGap: 1,
  barRadius: 2,
  height: 60,
  normalize: true
});

  const rowData = filteredLog[selectedIndex];
  if (!rowData) return;

  const { nextSong } = getPrevNextSongs(selectedIndex);

  // 🎙 preload VT
  const saved = recordings[rowData.cart];
  if (saved) {
    vtWave.load(URL.createObjectURL(saved));
  }

  // 🎵 preload next song
  if (nextSong) {
    const songUrl = `${API_BASE}/audio/song/${encodeURIComponent(nextSong.filename)}`;
    songWave.load(songUrl);
  }

  // ✅ Track readiness
  let vtReady = false;
  let songReady = false;

  vtWave.once("ready", () => {
    vtReady = true;
    checkReady();
  });

  songWave.once("ready", () => {
    songReady = true;
    checkReady();
  });

  function checkReady() {
    if (vtReady && songReady) {
      console.log("🔥 Both waveforms ready");
      window.isAudioReady = true;
    }
  }

}, 50);

      // 🔁 Restore previous recording if exists
      const rowData = filteredLog[selectedIndex];
      const saved = recordings[rowData.cart];

      if (saved) {
        const player = document.getElementById("player");

        setupPlayer(player, saved);

        recordedBlob = saved;
        document.getElementById("uploadBtn").disabled = false;
        document.getElementById("status").textContent = "VT Previously recorded";
      }

      // 🔁 Restore upload state
      if (uploaded[rowData.cart]) {
        const btn = document.getElementById("uploadBtn");
        const status = document.getElementById("status");

        btn.textContent = "VT Uploaded ✓";
        btn.disabled = true;
        status.textContent = "✅ Already uploaded";
      }
    }
  });
}


let previewAudio = null;
let currentPlayBtn = null;

function playSong(filename, btn) {
  const url = `${API_BASE}/audio/song/${encodeURIComponent(filename)}`;

  // 🔴 stop VT preview if playing
  if (isPreviewPlaying) {
    stopPreview();
  }

  // 🔁 clicking same button = stop
  if (currentPlayBtn === btn && previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    btn.textContent = "▶";
    currentPlayBtn = null;
    return;
  }

  // 🎵 stop previous audio
  if (previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    if (currentPlayBtn) {
      currentPlayBtn.textContent = "▶";
    }
  }

  // ▶ start new

  // TRIM SILENCE ON WAV VT
function trimSilence(samples, sampleRate, threshold = 0.01, windowSize = 1024) {
  let start = 0;
  let end = samples.length - 1;

  function rms(startIdx) {
    let sum = 0;
    for (let i = 0; i < windowSize; i++) {
      const s = samples[startIdx + i] || 0;
      sum += s * s;
    }
    return Math.sqrt(sum / windowSize);
  }

  // find start
  for (let i = 0; i < samples.length - windowSize; i += windowSize) {
    if (rms(i) > threshold) {
      start = i;
      break;
    }
  }

  // find end
  for (let i = samples.length - windowSize; i > 0; i -= windowSize) {
    if (rms(i) > threshold) {
      end = i;
      break;
    }
  }

  // padding (keeps natural feel)
  const padding = sampleRate * 0.1; // 100ms

  start = Math.max(0, start - padding);
  end = Math.min(samples.length - 1, end + padding);

  return samples.slice(start, end);
}

async function startRecording() {
  mediaStream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  });

  audioContext = new AudioContext();

  const source = audioContext.createMediaStreamSource(mediaStream);

  const gainNode = audioContext.createGain();
  gainNode.gain.value = 1.2;

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const processor = audioContext.createScriptProcessor(8192, 1, 1);

  let samples = [];

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    samples.push(new Float32Array(input));
  };

  // 🔊 connect audio chain
  source.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(processor);
  processor.connect(audioContext.destination);

  // 🎙 store recorder
  window._recorder = { samples, processor };

  // ✅ START RECORDING STATE BEFORE DRAW
  isRecording = true;
isVUActive = true;
updateVU();

  document.getElementById("recordBtn").textContent = "Stop";
  document.getElementById("status").textContent = "Recording...";

  // ⏱ timer
  recordSeconds = 0;

  recordInterval = setInterval(() => {
    recordSeconds++;

    const mins = Math.floor(recordSeconds / 60);
    const secs = (recordSeconds % 60).toString().padStart(2, "0");

    const el = document.getElementById("recordTime");
    if (el) el.textContent = `⏱ ${mins}:${secs}`;
  }, 1000);
}

function encodeMP3(samples, sampleRate) {
  const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128); // mono, 128 kbps
  const blockSize = 1152;

  let mp3Data = [];

  // convert Float32 → Int16
  const samples16 = new Int16Array(samples.length);
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    samples16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }

  for (let i = 0; i < samples16.length; i += blockSize) {
    const chunk = samples16.subarray(i, i + blockSize);
    const mp3buf = mp3encoder.encodeBuffer(chunk);
    if (mp3buf.length > 0) {
      mp3Data.push(mp3buf);
    }
  }

  const mp3buf = mp3encoder.flush();
  if (mp3buf.length > 0) {
    mp3Data.push(mp3buf);
  }

  return new Blob(mp3Data, { type: "audio/mpeg" });
}
  
async function stopRecording() {
  await new Promise(r => setTimeout(r, 50));

  // ⏱ STOP TIMER
  if (recordInterval) {
    clearInterval(recordInterval);
    recordInterval = null;
  }

  isDrawingLive = false;
  isRecording = false;

  const { samples, processor } = window._recorder;

  processor.disconnect();

  let length = samples.reduce((sum, s) => sum + s.length, 0);
  let flat = new Float32Array(length);

  let offset = 0;
  for (let s of samples) {
    flat.set(s, offset);
    offset += s.length;
  }

  const trimmed = trimSilence(flat, audioContext.sampleRate, 0.01);

  let rawBlob = encodeMP3(trimmed, audioContext.sampleRate);

  const row = filteredLog[selectedIndex];
  const { nextSong } = getPrevNextSongs(selectedIndex);

  // 🎯 CALCULATE DURATION
  const duration = trimmed.length / audioContext.sampleRate;

  // 🎯 DETERMINE SEC TONE
  let secToneSeconds;

  if (secToneTime !== null) {
    secToneSeconds = secToneTime;
    console.log("🎯 Using manual Sec Tone:", secToneSeconds);
  } else {
    if (nextSong && duration > nextSong.intro) {
      secToneSeconds = duration - nextSong.intro;
    } else {
      secToneSeconds = duration;
    }
    console.log("🤖 Using auto Sec Tone:", secToneSeconds);
  }

  const remaining = duration - secToneSeconds;
  const secTone = Math.floor(remaining * 1000);

  // 🎯 TAG + SAVE
  recordedBlob = await addID3Tags(
    rawBlob,
    row,
    nextSong,
    duration,
    secTone
  );

  recordings[row.cart] = recordedBlob;

  const player = document.getElementById("player");
  setupPlayer(player, recordedBlob);

  // =========================
  // 🔥 RESTORE WAVESURFER STYLE
  // =========================
  if (vtWave) {
    window.isAudioReady = false;

    // back to normal colors (match songWave)
    vtWave.setOptions({
      waveColor: "#1e3a8a",
      progressColor: "#00ff88"
    });

    // load final waveform
    vtWave.load(URL.createObjectURL(recordedBlob));

    vtWave.once("ready", () => {
      console.log("🎙 VT ready after recording");
      window.isAudioReady = true;
    });
  }

  document.getElementById("uploadBtn").disabled = false;
  document.getElementById("status").textContent = "Ready to upload";

  mediaStream.getTracks().forEach(track => track.stop());

  if (audioContext) {
    audioContext.close();
    analyser = null;
  }

  document.getElementById("recordBtn").textContent = "Start";

  // 🔊 stop song + restore volume
  if (songWave) {
    songWave.setVolume(1);
    songWave.stop();
  }

  isVUActive = false;

// reset meter visually
const bar = document.getElementById("vuBar");
if (bar) bar.style.width = "0%";

}

async function addID3Tags(blob, row, nextSong, duration, secTone) {
  const mp3 = new Uint8Array(await blob.arrayBuffer());

  function toSynchsafe(size) {
    return [
      (size >> 21) & 0x7f,
      (size >> 14) & 0x7f,
      (size >> 7) & 0x7f,
      size & 0x7f
    ];
  }

  function writeString(view, offset, str) {
    for (let i = 0; i < str.length; i++) {
      view[offset + i] = str.charCodeAt(i);
    }
  }

  function createTXXX(desc, value) {
    const descBytes = new TextEncoder("latin1").encode(desc);
    const valueBytes = new TextEncoder("latin1").encode(value);

    const size = 1 + descBytes.length + 1 + valueBytes.length;

    const frame = new Uint8Array(10 + size);

    // Frame ID
    writeString(frame, 0, "TXXX");

    // Frame size (normal int for v2.3)
    frame[4] = (size >> 24) & 0xff;
    frame[5] = (size >> 16) & 0xff;
    frame[6] = (size >> 8) & 0xff;
    frame[7] = size & 0xff;

    // Flags
    frame[8] = 0;
    frame[9] = 0;

    // Encoding = 0 (ISO-8859-1)
    frame[10] = 0x00;

    // Description
    frame.set(descBytes, 11);

    // Null separator
    frame[11 + descBytes.length] = 0x00;

    // Value
    frame.set(valueBytes, 12 + descBytes.length);

    return frame;
  }

  // 🎯 Build frames
  const frames = [
    createTXXX("Sec Tone", secTone.toString()),
    createTXXX("Category", "AUDIO"),
    createTXXX("No fade", "0")
  ];

  const tagSize = frames.reduce((sum, f) => sum + f.length, 0);

  // 🎯 ID3 header
  const header = new Uint8Array(10);
  writeString(header, 0, "ID3");
  header[3] = 3; // v2.3
  header[4] = 0;
  header[5] = 0;

  const sizeBytes = toSynchsafe(tagSize);
  header[6] = sizeBytes[0];
  header[7] = sizeBytes[1];
  header[8] = sizeBytes[2];
  header[9] = sizeBytes[3];

  // 🎯 Combine
  const final = new Uint8Array(10 + tagSize + mp3.length);

  final.set(header, 0);

  let offset = 10;
  for (const f of frames) {
    final.set(f, offset);
    offset += f.length;
  }

  final.set(mp3, offset);

  return new Blob([final], { type: "audio/mpeg" });
}

  try {
    const res = await fetch(
      `${API_BASE}/music/meta/${encodeURIComponent(file.name)}`,
      {
        headers: { Authorization: "Bearer " + token }
      }
    );

    const data = await res.json();

    libSecTone = data.secTone || 0;
    libIntro = data.intro || 0;

    moveMarker(libSecTone);
    moveIntroMarker(libIntro);

  } catch (err) {
    console.error("Meta load failed", err);

    libSecTone = 0;
    libIntro = 0;

    moveMarker(0);
    moveIntroMarker(0);
  }
});
}

function updateSecToneDisplay() {
  const el = document.getElementById("secToneTime");
  if (el) {
    el.textContent = libSecTone.toFixed(2);
  }
}

function playLibPreview() {
  if (libWave) libWave.play();
}

function stopLibPreview() {
  if (libWave) libWave.stop();
}


function filterSongs() {
  const search = document.getElementById("songSearch").value.toLowerCase();

  const filtered = allSongs.filter(f =>
    f.name.toLowerCase().includes(search)
  );

  renderLibrary(filtered);
}

// 🔥 USE YOUR EXISTING PLAYER SYSTEM (UNCHANGED)
function playLibrarySong(file) {
  const url = `${API_BASE}/audio/song/${encodeURIComponent(file.name)}`;

  if (previewAudio) {
    previewAudio.pause();
  }

  previewAudio = new Audio(url);
  previewAudio.play();
}

async function saveSecTone() {
  if (!currentLibFile) return;

  try {
    await fetch(`${API_BASE}/sectone`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        filename: currentLibFile.name,
        secTone: libSecTone,
        intro: libIntro
      })
    });

    alert("Sec Tone saved!");

  } catch (err) {
    console.error(err);
    alert("Failed to save");
  }
}

function moveMarker(time) {
  if (!libWave) return;

  const duration = libWave.getDuration();
  const percent = time / duration;

  const marker = document.getElementById("secMarker");
  const container = document.getElementById("libWaveform");

  const width = container.clientWidth;

  marker.style.left = (percent * width) + "px";

  libSecTone = time;

  updateSecToneDisplay();
}


const marker = document.getElementById("secMarker");
const container = document.getElementById("libWaveform");

marker.onmousedown = () => {
  isDraggingMarker = true;
};

document.addEventListener("mouseup", () => {
  isDragging = false;
  isDraggingMarker = false;
  isDraggingIntro = false;
});

document.addEventListener("mousemove", (e) => {
  if (!isDraggingMarker || !libWave) return;

  const container = document.getElementById("libWaveform");
  const rect = container.getBoundingClientRect();

  let x = e.clientX - rect.left;
  x = Math.max(0, Math.min(rect.width, x));

  const percent = x / rect.width;
  const time = percent * libWave.getDuration();

  moveMarker(time);
});

function playFromSecTone() {
  if (!libWave) return;

  libWave.setTime(libSecTone);
  libWave.play();
}

function playFromIntro() {
  if (!libWave) return;

  libWave.setTime(libIntro);
  libWave.play();
}


function moveIntroMarker(time) {
  if (!libWave) return;

  const duration = libWave.getDuration();
  const percent = time / duration;

  const marker = document.getElementById("introMarker");
  const container = document.getElementById("libWaveform");

  const width = container.clientWidth;

  marker.style.left = (percent * width) + "px";

  libIntro = time;

  updateIntroDisplay();
}

document.addEventListener("DOMContentLoaded", () => {
  const introMarker = document.getElementById("introMarker");

  introMarker.onmousedown = (e) => {
    e.stopPropagation();
    isDraggingIntro = true;
  };
});

document.addEventListener("mousemove", (e) => {
  if (!isDraggingIntro || !libWave) return;

  const container = document.getElementById("libWaveform");
  const rect = container.getBoundingClientRect();

  let x = e.clientX - rect.left;
  x = Math.max(0, Math.min(rect.width, x));

  const percent = x / rect.width;
  const time = percent * libWave.getDuration();

  moveIntroMarker(time);
});

function updateIntroDisplay() {
  const el = document.getElementById("introTime");
  if (el) {
    el.textContent = libIntro.toFixed(2);
  }
}

</script>
