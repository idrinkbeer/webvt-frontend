<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #020617;
      padding: 10px;
      font-size: 13px;
      color: #94a3b8;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    tr:hover { background: #334155; cursor: pointer; }

    .vtx { color: #facc15; font-weight: bold; }
    .active { background: #2563eb !important; }

    .recorder {
      background: #020617;
      padding: 15px;
      border-radius: 6px;
    }

    .vu-container {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
    }

    #vuBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      border-radius: 5px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    /* 🎧 PLAYER */
    .audio-player {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .audio-player button {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .audio-player button:hover {
      transform: scale(1.05);
    }

    .progress {
      flex: 1;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: #22c55e;
    }

    #time {
      font-size: 12px;
      color: #94a3b8;
    }

    #recordTime {
      margin-top: 8px;
      font-size: 13px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<h1>🎙️ Web VT for AIR</h1>

<select id="logSelect"></select>
<select id="hourSelect" style="display:none;"></select>

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Title</th>
      <th>Artist</th>
      <th>Intro</th>
      <th>End</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let log = [];
let filteredLog = [];
let selectedIndex = null;
let currentHour = null;

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

let isRecording = false;
let audioContext, analyser, dataArray, mediaStream;

// ⏱ TIMER
let recordSeconds = 0;
let recordInterval = null;

const tableBody = document.querySelector("#logTable tbody");

// =====================
// UPLOAD (UNCHANGED)
// =====================
async function uploadToAIR() {
  if (!recordedBlob) return;

  const row = filteredLog[selectedIndex];

  const formData = new FormData();
  formData.append("file", recordedBlob, `${row.cart}.wav`);
  formData.append("cart", row.cart);

  const status = document.getElementById("status");
  const btn = document.getElementById("uploadBtn");

  status.textContent = "Uploading...";
  btn.disabled = true;

  try {
    const res = await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error("Upload failed");

    status.textContent = "✅ Uploaded to AIR";
    btn.textContent = "Uploaded ✓";

  } catch (err) {
    console.error(err);
    status.textContent = "❌ Upload failed";
    btn.disabled = false;
  }
}

// =====================
// (ALL YOUR ORIGINAL LOGIC UNCHANGED)
// =====================

function renderTable() {
  tableBody.innerHTML = "";

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>${row.type === "VTX" ? row.title + " (" + row.cart + ")" : row.title}</td>
      <td>${row.artist || ""}</td>
      <td>${row.intro || ""}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    if (i === selectedIndex && row.type === "VTX") {
      const recorderRow = document.createElement("tr");

      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            🎙️ Recording for Cart: ${row.cart}<br><br>

            <button id="recordBtn" onclick="toggleRecording()">Start</button>

            <button id="uploadBtn" onclick="uploadToAIR()" disabled>
              Upload to AIR
            </button>

            <div class="vu-container">
              <div id="vuBar"></div>
            </div>

            <div id="recordTime">⏱ 0:00</div>

            <div id="status"></div>

            <div class="audio-player">
              <button id="playBtn"><span id="playIcon">▶</span></button>
              <div class="progress">
                <div id="progressBar"></div>
              </div>
              <span id="time">0:00</span>
            </div>

            <audio id="player"></audio>
          </div>
        </td>
      `;

      tableBody.appendChild(recorderRow);
    }
  });
}

// =====================
// RECORDING (only additions)
// =====================
async function startRecording() {
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(mediaStream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const processor = audioContext.createScriptProcessor(4096, 1, 1);

  let samples = [];

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    samples.push(new Float32Array(input));
  };

  source.connect(analyser);
  analyser.connect(processor);
  processor.connect(audioContext.destination);

  window._recorder = { samples, processor };

  updateVU();

  // ⏱ TIMER START
  recordSeconds = 0;
  recordInterval = setInterval(() => {
    recordSeconds++;
    const mins = Math.floor(recordSeconds / 60);
    const secs = (recordSeconds % 60).toString().padStart(2,"0");
    document.getElementById("recordTime").textContent = `⏱ ${mins}:${secs}`;
  },1000);

  isRecording = true;

  document.getElementById("recordBtn").textContent = "Stop";
  document.getElementById("status").textContent = "Recording...";
}

function stopRecording() {

  // ⏱ TIMER STOP
  if (recordInterval) {
    clearInterval(recordInterval);
    recordInterval = null;
  }

  // (rest of your original code stays the same)
}

// =====================
loadLogs();
</script>

</body>
</html>
