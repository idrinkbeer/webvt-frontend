<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #020617;
      padding: 10px;
      font-size: 13px;
      color: #94a3b8;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    tr:hover { background: #334155; cursor: pointer; }

    .vtx { color: #facc15; font-weight: bold; }
    .active { background: #2563eb !important; }

    .recorder {
      background: #020617;
      padding: 15px;
      border-radius: 6px;
    }

    .vu-container {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
    }

    #vuBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      border-radius: 5px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    audio { width: 100%; margin-top: 10px; }
  </style>
</head>

<body>

<h1>🎙️ Web VT for AIR</h1>

<select id="logSelect"></select>
<select id="hourSelect" style="display:none;"></select>

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Title</th>
      <th>Artist</th>
      <th>Intro</th>
      <th>End</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let log = [];
let filteredLog = [];
let selectedIndex = null;

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

let isRecording = false;
let audioContext, analyser, dataArray, mediaStream;

const tableBody = document.querySelector("#logTable tbody");

// =====================
// LOAD LOGS
// =====================
async function loadLogs() {
  const res = await fetch("https://web-vt-api.miup3p.easypanel.host/logs");
  const files = await res.json();

  const select = document.getElementById("logSelect");

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  select.onchange = () => loadSelectedLog(select.value);
}

async function loadSelectedLog(filename) {
  const res = await fetch(`https://web-vt-api.miup3p.easypanel.host/logs/${filename}`);
  const text = await res.text();

  processASC(text);
}

// =====================
// ASC PROCESSING
// =====================
function processASC(text) {
  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          intro: parseInt(parts[10]) || 0,
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          cart: parts[4],
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  renderTable();
}

// =====================
// TABLE RENDER
// =====================
function renderTable() {
  tableBody.innerHTML = "";

  filteredLog = log;

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("active");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>${row.type === "VTX" ? row.title + " (" + row.cart + ")" : row.title}</td>
      <td>${row.artist || ""}</td>
      <td>${row.intro || ""}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    if (i === selectedIndex && row.type === "VTX") {
      const recorderRow = document.createElement("tr");

      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            🎙️ Recording for Cart: ${row.cart}<br><br>

            <button id="recordBtn" onclick="toggleRecording()">Start Recording</button>
            <button id="uploadBtn" onclick="uploadToAIR()" disabled>Upload to AIR</button>

            <div class="vu-container">
              <div id="vuBar"></div>
            </div>

            <div id="status"></div>
            <audio id="player" controls></audio>
          </div>
        </td>
      `;

      tableBody.appendChild(recorderRow);
    }
  });
}

function selectRow(i) {
  if (filteredLog[i].type !== "VTX") return;
  selectedIndex = i;
  renderTable();
}

// =====================
// RECORDING
// =====================
async function toggleRecording() {
  if (!isRecording) {
    await startRecording();
  } else {
    stopRecording();
  }
}

async function startRecording() {
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(mediaStream);
  audioChunks = [];

  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };

  mediaRecorder.start();

  // VU setup
  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(mediaStream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  source.connect(analyser);

  updateVU();

  isRecording = true;

  document.getElementById("recordBtn").textContent = "Stop Recording";
  document.getElementById("status").textContent = "Recording...";
}

function stopRecording() {
  mediaRecorder.stop();

  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(audioChunks, { type: "audio/webm" });
    audioChunks = [];

    document.getElementById("player").src = URL.createObjectURL(recordedBlob);
    document.getElementById("uploadBtn").disabled = false;
    document.getElementById("status").textContent = "Ready to upload";
  };

  mediaStream.getTracks().forEach(track => track.stop());

  if (audioContext) {
    audioContext.close();
    analyser = null;
  }

  isRecording = false;
  document.getElementById("recordBtn").textContent = "Start Recording";
}

// =====================
// VU METER
// =====================
function updateVU() {
  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  let sum = dataArray.reduce((a, b) => a + b, 0);
  let avg = sum / dataArray.length;

  document.getElementById("vuBar").style.width = (avg / 255 * 100) + "%";

  requestAnimationFrame(updateVU);
}

// =====================
// UPLOAD
// =====================
async function uploadToAIR() {
  const row = filteredLog[selectedIndex];

  const formData = new FormData();
  formData.append("file", recordedBlob, `${row.cart}.wav`);
  formData.append("cart", row.cart);

  const status = document.getElementById("status");
  status.textContent = "Uploading...";

  const res = await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
    method: "POST",
    body: formData
  });

  if (res.ok) {
    status.textContent = "✅ Uploaded!";
  } else {
    status.textContent = "❌ Upload failed";
  }
}

// =====================
loadLogs();
</script>

</body>
</html>
