<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #020617;
      padding: 10px;
      font-size: 13px;
      color: #94a3b8;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    tr:hover { background: #334155; cursor: pointer; }

    .vtx { color: #facc15; font-weight: bold; }
    .active { background: #2563eb !important; }

    .recorder {
      background: #020617;
      padding: 15px;
      border-radius: 6px;
    }

    .vu-container {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
    }

    #vuBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      border-radius: 5px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    /* 🎧 MODERN PLAYER */
    .audio-player {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .audio-player button {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .audio-player button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(34,197,94,0.5);
    }

    .progress {
      flex: 1;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: #22c55e;
    }

    #time {
      font-size: 12px;
      color: #94a3b8;
    }

    #recordTime {
      margin-top: 8px;
      font-size: 13px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<h1>🎙️ Web VT for AIR</h1>

<select id="logSelect"></select>
<select id="hourSelect" style="display:none;"></select>

<table id="logTable">
  <thead>
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Title</th>
      <th>Artist</th>
      <th>Intro</th>
      <th>End</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let log = [];
let filteredLog = [];
let selectedIndex = null;
let currentHour = null;

let recordedBlob = null;

let isRecording = false;
let audioContext, analyser, dataArray, mediaStream;

let recordSeconds = 0;
let recordInterval = null;

const tableBody = document.querySelector("#logTable tbody");

// =====================
// UPLOAD
// =====================
async function uploadToAIR() {
  if (!recordedBlob) return;

  const row = filteredLog[selectedIndex];

  const formData = new FormData();
  formData.append("file", recordedBlob, `${row.cart}.wav`);
  formData.append("cart", row.cart);

  const status = document.getElementById("status");
  const btn = document.getElementById("uploadBtn");

  status.textContent = "Uploading...";
  btn.disabled = true;

  try {
    const res = await fetch("https://web-vt-api.miup3p.easypanel.host/upload", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error();

    status.textContent = "✅ Uploaded";
  } catch {
    status.textContent = "❌ Upload failed";
    btn.disabled = false;
  }
}

// =====================
// LOAD LOGS
// =====================
async function loadLogs() {
  const res = await fetch("https://web-vt-api.miup3p.easypanel.host/logs");
  const files = await res.json();

  const select = document.getElementById("logSelect");

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  select.onchange = () => loadSelectedLog(select.value);
}

async function loadSelectedLog(filename) {
  const res = await fetch(`https://web-vt-api.miup3p.easypanel.host/logs/${filename}`);
  const text = await res.text();
  processASC(text);
}

// =====================
// ASC
// =====================
function processASC(text) {
  log = text.split("\n").map(line => {
    const parts = line.split("\\");

    if (line.includes("\\MUS\\")) {
      return {
        type: "SONG",
        time: parts[0],
        title: parts[5],
        artist: parts[6]
      };
    }

    if (line.includes("\\VTX\\")) {
      return {
        type: "VTX",
        time: parts[0],
        cart: parts[4],
        title: "VOICE TRACK"
      };
    }
  }).filter(Boolean);

  filteredLog = log;
  renderTable();
}

// =====================
// TABLE
// =====================
function renderTable() {
  tableBody.innerHTML = "";

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>${row.title}</td>
      <td>${row.artist || ""}</td>
      <td></td>
      <td></td>
    `;

    tr.onclick = () => {
      if (row.type !== "VTX") return;
      selectedIndex = i;
      renderTable();
    };

    tableBody.appendChild(tr);

    if (i === selectedIndex && row.type === "VTX") {
      const recorderRow = document.createElement("tr");

      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">
            🎙️ Cart: ${row.cart}<br><br>

            <button id="recordBtn" onclick="toggleRecording()">Start</button>
            <button id="uploadBtn" onclick="uploadToAIR()" disabled>Upload</button>

            <div class="vu-container"><div id="vuBar"></div></div>
            <div id="recordTime">⏱ 0:00</div>
            <div id="status"></div>

            <div class="audio-player">
              <button id="playBtn">
                <span id="playIcon">
                  ▶
                </span>
              </button>
              <div class="progress"><div id="progressBar"></div></div>
              <span id="time">0:00</span>
            </div>

            <audio id="player"></audio>
          </div>
        </td>
      `;

      tableBody.appendChild(recorderRow);
    }
  });
}

// =====================
// RECORDING
// =====================
async function toggleRecording() {
  if (!isRecording) startRecording();
  else stopRecording();
}

async function startRecording() {
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(mediaStream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const processor = audioContext.createScriptProcessor(4096, 1, 1);
  let samples = [];

  processor.onaudioprocess = e => {
    samples.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };

  source.connect(analyser);
  analyser.connect(processor);
  processor.connect(audioContext.destination);

  window._recorder = { samples, processor };

  updateVU();

  recordSeconds = 0;
  recordInterval = setInterval(() => {
    recordSeconds++;
    const m = Math.floor(recordSeconds / 60);
    const s = (recordSeconds % 60).toString().padStart(2,"0");
    document.getElementById("recordTime").textContent = `⏱ ${m}:${s}`;
  },1000);

  isRecording = true;
  document.getElementById("recordBtn").textContent = "Stop";
}

function stopRecording() {
  clearInterval(recordInterval);

  const { samples, processor } = window._recorder;
  processor.disconnect();

  let flat = new Float32Array(samples.flat());

  const wavBuffer = encodeWAV(flat, audioContext.sampleRate);
  recordedBlob = new Blob([wavBuffer]);

  const player = document.getElementById("player");
  player.src = URL.createObjectURL(recordedBlob);

  setTimeout(() => {
    const playBtn = document.getElementById("playBtn");
    const icon = document.getElementById("playIcon");
    const progressBar = document.getElementById("progressBar");
    const timeLabel = document.getElementById("time");

    playBtn.onclick = () => {
      if (player.paused) {
        player.play();
        icon.textContent = "⏸";
      } else {
        player.pause();
        icon.textContent = "▶";
      }
    };

    player.ontimeupdate = () => {
      progressBar.style.width = (player.currentTime / player.duration) * 100 + "%";
      timeLabel.textContent = Math.floor(player.currentTime/60)+":"+Math.floor(player.currentTime%60).toString().padStart(2,"0");
    };

    document.querySelector(".progress").onclick = e => {
      const rect = e.currentTarget.getBoundingClientRect();
      player.currentTime = ((e.clientX-rect.left)/rect.width)*player.duration;
    };

  },50);

  document.getElementById("uploadBtn").disabled = false;

  mediaStream.getTracks().forEach(t => t.stop());
  audioContext.close();

  isRecording = false;
  document.getElementById("recordBtn").textContent = "Start";
}

// =====================
// VU
// =====================
function updateVU() {
  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);
  const avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;

  document.getElementById("vuBar").style.width = (avg/255*100)+"%";
  requestAnimationFrame(updateVU);
}

// =====================
function encodeWAV(samples, rate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);

  const write = (o,s)=>[...s].forEach((c,i)=>view.setUint8(o+i,c.charCodeAt(0)));

  write(0,"RIFF");
  view.setUint32(4,36+samples.length*2,true);
  write(8,"WAVEfmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,rate,true);
  view.setUint32(28,rate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  write(36,"data");
  view.setUint32(40,samples.length*2,true);

  let offset=44;
  for(let i=0;i<samples.length;i++,offset+=2){
    let s=Math.max(-1,Math.min(1,samples[i]));
    view.setInt16(offset,s<0?s*0x8000:s*0x7fff,true);
  }

  return buffer;
}

loadLogs();
</script>

</body>
</html>
