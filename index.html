<!DOCTYPE html>
<html>
<head>
  <title>Web VT for AIR</title>

  <style>

/* ===== AIR THEME ===== */

body {
  font-family: "Arial Narrow", Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 10px;
  font-weight: bold;
}

/* TABLE = LOG VIEW */
table {
  border-collapse: collapse;
  width: 100%;
  background: #000;
}

/* HEADER */
th {
  background: #001a66;
  color: #fff;
  padding: 8px;
  font-size: 12px;
  text-align: left;
  border: 2px solid #000;
}

/* ROWS */
td {
  padding: 8px;
  border-bottom: 2px solid #000;
}

/* DEFAULT ROW (music) */
tr {
  background: #0b3d91;
}

/* HOVER */
tr:hover {
  filter: brightness(1.2);
  cursor: pointer;
}


/* ON AIR row */
.onair {
  position: relative;
  color: #000;
}

/* ON AIR blinking text */
.onair::after {
  content: "● ON AIR";
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  font-size: 18px;
  font-weight: bold;
  color: #ff0000;

  animation: blink 1s steps(2, start) infinite;
  pointer-events: none;
}

/* selected (voicetrack) row */
.selected {
  outline: 2px solid #ffff00;
}

/* allow gradient to show through cells */
#logTable tbody tr.onair td {
  background: transparent !important;
}

@keyframes blink {
  0%   { opacity: 1; }
  50%  { opacity: 0; }
  100% { opacity: 1; }
}

/* VOICE TRACK */
.vtx {
  background: #800080 !important;
  color: #fff;
}

/* SWEEPER (add this class in your HTML if needed) */
.swp {
  background: #cc0000 !important;
}

/* BUTTONS */
button {
  background: #0033cc;
  border: 2px solid #000;
  padding: 8px 14px;
  margin-right: 10px;
  color: white;
  cursor: pointer;
  font-weight: bold;
  text-transform: uppercase;
}

button:hover {
  background: #0055ff;
}

/* GREEN BUTTON (like AUTO / play) */
.button-green {
  background: #00cc33;
  color: #000;
}

/* RECORDER PANEL */
.recorder {
  background: #001a66;
  padding: 15px;
  border: 2px solid #000;
}

/* VU METER */
.vu-container {
  height: 10px;
  background: #222;
  margin-top: 10px;
}

#vuBar {
  height: 10px;
  width: 0%;
  background: #00cc33;
}

/* AUDIO PLAYER (KEEP FUNCTIONAL, JUST RESTYLE) */
.audio-player {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.progress {
  flex: 1;
  height: 6px;
  background: #222;
  cursor: pointer;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: #00cc33;
}

#time {
  font-size: 12px;
  color: #ccc;
}

#playhead {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;
  background: red;
  z-index: 10;
  pointer-events: none;
}

/* LOGIN SCREEN (AIR STYLE) */
#loginContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #000;

  display: flex;
  justify-content: center;
  align-items: center;
}

#loginBox {
  background: #001a66;
  padding: 25px;
  border: 2px solid #000;
  text-align: center;
}

#loginBox input {
  width: 200px;
  padding: 8px;
  border: 2px solid #000;
  background: #000;
  color: #fff;
  margin-bottom: 10px;
}

/* LOADER */
.loader {
  border: 4px solid #222;
  border-top: 4px solid #00cc33;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}

#spinner {
  transition: opacity 0.2s ease;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* REMOVE MODERN LOOK */
* {
  border-radius: 0 !important;
  box-shadow: none !important;
}

.air-btn {
  background: #0033cc;
  color: #fff;
  border: 3px solid #000;

  font-family: "Arial Narrow", Arial, sans-serif;
  font-weight: bold;
  text-transform: uppercase;

  padding: 10px 18px;
  min-width: 160px;

  cursor: pointer;

  border-radius: 0;
  box-shadow: none;
}

.air-btn:hover {
  background: #0055ff;
}

.air-btn-green {
  background: #00cc33 !important;
  color: #000 !important;
}

.air-btn-red {
  background: #cc0000 !important;
  color: #fff !important;
}


select {
  background: #0033cc;
  color: #fff;
  border: 2px solid #000;

  font-family: "Arial Narrow", Arial, sans-serif;
  font-weight: bold;

  padding: 6px 30px 6px 10px; /* 👈 extra right padding */
  height: 34px;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  cursor: pointer;

  background-image:
    linear-gradient(45deg, transparent 50%, #fff 50%),
    linear-gradient(135deg, #fff 50%, transparent 50%);

  background-position:
    calc(100% - 12px) center,
    calc(100% - 7px) center;

  background-size: 5px 5px;
  background-repeat: no-repeat;
}

/* spacing between dropdowns */
select + select {
  margin-left: 5px;
}

/* ===== RECORDER AIR LAYOUT ===== */

.recorder {
  background: #001a66;
  border: 2px solid #000;
  padding: 10px;
}

/* TOP BAR */
.recorder-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.rec-title {
  font-size: 14px;
  color: #fff;
}

.rec-controls {
  display: flex;
  gap: 8px;
}

.rec-time {
  font-size: 14px;
  color: #fff;
}

/* WAVEFORM */
.waveform {
  height: 70px;
  margin: 8px 0;
  background: #001a66;
}

/* BOTTOM SECTION */
.rec-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.rec-buttons {
  display: flex;
  gap: 8px;
}

.rec-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 40%;
}

/* tighten buttons */
.recorder .air-btn {
  min-width: 130px;
  padding: 6px 10px;
}

/* progress bar matches AIR */
.recorder .progress {
  flex: 1;
  height: 6px;
  background: #222;
  border: 1px solid #000;
}

.recorder #progressBar {
  height: 100%;
  background: #00cc33;
}

/* status text */
#status {
  margin-top: 6px;
  font-size: 12px;
}

/* VU + TIMER WRAP */
.rec-time-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* SMALL AIR VU METER */
.vu-inline {
  width: 100px;
  height: 10px;
  background: #111;
  border: 1px solid #000;
  position: relative;
}

/* LEVEL BAR */
#vuBar {
  height: 100%;
  width: 0%;
  background: #00cc33;
  transition: width 0.05s linear;
}

.waveform-wrap {
  position: relative;
}


#vtEditor {
  position: relative;
  height: 80px;
  background: #111;
  overflow: hidden;
}

.block-label {
  font-size: 12px;
  color: white;
  padding: 4px 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
}

/* VT block */
#vtBlock {
  position: absolute;
  top: 10px;
  height: 30px;
  background: #00cc33;
  color: #000;
  display: flex;
  align-items: center;
  cursor: grab;
  z-index: 2; /* 🔥 important so it sits above */
}


#introRegion {
  background: rgba(255, 255, 0, 0.6); /* intro */
}

#songBlock {
  background: linear-gradient(
    to right,
    rgba(255,255,0,0.6) 0%,
    rgba(255,255,0,0.6) var(--intro-width),
    #0099ff var(--intro-width),
    #0099ff 100%
  );
}

#vtBlock,
#songBlock {
  position: absolute;
  top: 10px;
  height: 30px;
  cursor: grab;
}

#songBlock {
  top: 45px; /* below VT */
}

    
</style>
</head>

<script src="https://unpkg.com/lamejs@1.2.0/lame.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
  
<script>
const STORAGE_KEY = "webvt_token_" + window.location.hostname;
let token = localStorage.getItem(STORAGE_KEY);
let log = [];
let filteredLog = [];
let selectedIndex = null;
let currentHour = null;

let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;

let isRecording = false;
let audioContext, analyser, dataArray, mediaStream;

let recordSeconds = 0;
let recordInterval = null;
let recordings = {};
let uploaded = {};
let secTones = {};
let vtWave;
let songAudio = null;
let isPreviewPlaying = false;
let vtFinished = false;
let songFinished = false;
let recordStage = 0; // 0 = idle, 1 = recording, 2 = song fired
let secToneTime = null;
let currentTitle = "";
let currentArtist = "";
let lastTitle = "";
let lastArtist = "";
let vuActive = false;
let previewTimer = null;

let API_BASE = "https://web-vt-api.miup3p.easypanel.host";

const tableBody = document.querySelector("#logTable tbody");
const PX_PER_SEC = 50; // tweak this


// =====================
// LOGIN SYSTEM 
// =====================
async function initApp() {
  if (!token) return;

  document.getElementById("loginContainer").style.display = "none";
  document.getElementById("app").style.display = "block";

 const files = await loadLogs();

const todayLog = getTodayLogName();

// 🔥 check if today's log exists
let selectedLog = files.includes(todayLog)
  ? todayLog
  : "DEFAULT.ASC";

console.log("📂 Loading log:", selectedLog);

// set dropdown properly

// 🚀 run it
initApp();
  
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const spinner = document.getElementById("spinner");

  const btn = document.querySelector("#loginBox button");

  // 👉 show spinner + disable button
  spinner.style.display = "block";
  btn.disabled = true;

  const res = await fetch(`${API_BASE}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  if (!res.ok) {
    spinner.style.display = "none";
    btn.disabled = false;
    document.getElementById("loginStatus").textContent = "❌ Login failed";
    return;
  }

  const data = await res.json();
  token = data.token;

  localStorage.setItem(STORAGE_KEY, token);

  document.getElementById("loginContainer").style.display = "none";
  document.getElementById("app").style.display = "block";

const files = await loadLogs();

const todayLog = getTodayLogName();

let selectedLog = files.includes(todayLog)
  ? todayLog
  : "DEFAULT.ASC";

console.log("📂 Loading log:", selectedLog);

document.getElementById("logSelect").value = selectedLog;

await loadSelectedLog(selectedLog);

await loadNowPlaying();

setTimeout(() => {
  jumpToCurrentTime();
}, 200);
}

function logout() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
  
// =====================
// UPLOAD VOICETRACK 
// =====================
  async function uploadToAIR() {
  if (!recordedBlob) return;

  const row = filteredLog[selectedIndex];

  const formData = new FormData();
  formData.append("file", recordedBlob, `${row.cart}.mp3`);
  formData.append("cart", row.cart);

  const status = document.getElementById("status");
  const btn = document.getElementById("uploadBtn");

  status.textContent = "Uploading...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    if (!res.ok) throw new Error("Upload failed");

    status.textContent = "✅ VT Uploaded to AIR";
    btn.textContent = "VT Uploaded ✓";
    uploaded[row.cart] = true;

  } catch (err) {
    console.error(err);
    status.textContent = "❌ Upload failed";
    btn.disabled = false;
  }
}
  
// =====================
// LOAD LOGS
// =====================
async function loadLogs() {
  const res = await fetch(`${API_BASE}/logs`, {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const files = await res.json();

  const select = document.getElementById("logSelect");
  select.innerHTML = "";

  files.forEach(file => {
    const opt = document.createElement("option");
    opt.value = file;
    opt.textContent = file;
    select.appendChild(opt);
  });

  // 🔥 FIX: proper onchange
  select.onchange = () => {
    if (select.value) {
      loadSelectedLog(select.value);
    }
  };

  return files; // 👈 important
}

async function loadSelectedLog(filename) {
  const res = await fetch(`${API_BASE}/logs/${filename}`, {
    headers: { Authorization: "Bearer " + token }
  });
  const text = await res.text();

  processASC(text);
  document.getElementById("hourSelect").style.display = "inline-block";
}

// =====================
// ASC PROCESSING
// =====================
function processASC(text) {
  log = text.split("\n")
    .map(line => {
      const parts = line.split("\\");

      if (line.includes("\\MUS\\")) {
        return {
          type: "SONG",
          time: parts[0],
          title: parts[5],
          artist: parts[6],
          filename: parts[12]?.trim(),
          intro: parseInt(parts[10]) || 0,
          end: parts[11]
        };
      }

      if (line.includes("\\VTX\\")) {
        return {
          type: "VTX",
          time: parts[0],
          cart: parts[4],
          title: "VOICE TRACK"
        };
      }

      return null;
    })
    .filter(Boolean);

  buildHourDropdown();
  filterByHour(log[0].time.split(":")[0]);
}

// =====================
// HOURS
// =====================
function buildHourDropdown() {
  const hours = [...new Set(log.map(r => r.time.split(":")[0]))].sort();

  const select = document.getElementById("hourSelect");
  select.innerHTML = "";

  hours.forEach(hour => {
    const opt = document.createElement("option");
    opt.value = hour;
    opt.textContent = hour;
    select.appendChild(opt);
  });

  currentHour = hours[0];
  select.value = currentHour;

  select.onchange = () => {
    currentHour = select.value;
    filterByHour(currentHour);
  };
}

// =====================
// TABLE
// =====================
function filterByHour(hour) {
  filteredLog = log.filter(row => row.time.startsWith(hour));
  selectedIndex = null;
  renderTable();
}

function renderTable() {
  tableBody.innerHTML = "";

  filteredLog.forEach((row, i) => {
    const tr = document.createElement("tr");

    if (row.type === "VTX") tr.classList.add("vtx");
    if (i === selectedIndex) tr.classList.add("selected");

    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.type}</td>
      <td>
        ${row.type === "SONG" ? `
          <button onclick="playSong('${row.filename}', this)">▶</button>
        ` : ""}
        ${row.type === "VTX" ? row.title + " (" + row.cart + ")" : row.title}
      </td>
      <td>${row.artist || ""}</td>
      <td>${row.intro || ""}</td>
      <td>${row.end || ""}</td>
    `;

    tr.onclick = () => selectRow(i);
    tableBody.appendChild(tr);

    // 🎙 SHOW RECORDER FOR SELECTED VTX
    if (i === selectedIndex && row.type === "VTX") {
      const recorderRow = document.createElement("tr");

      recorderRow.innerHTML = `
        <td colspan="6">
          <div class="recorder">

            <div class="recorder-top">
              <div class="rec-title">🎙 Recording for Cart: ${row.cart}</div>

              <div class="rec-controls">
                <button id="recordBtn" class="air-btn" onclick="toggleRecording()">START</button>
                <button id="uploadBtn" class="air-btn" onclick="uploadToAIR()" disabled>UPLOAD TO AIR</button>
              </div>

              <div class="rec-time-wrap">
                <div class="rec-time" id="recordTime">⏱ 0:00</div>
                <div class="vu-inline">
                  <div id="vuBar"></div>
                </div>
              </div>
            </div>

            <div id="vtEditor">
            <div id="playhead"></div>
              <div id="vtWaveform" style="display:none;"></div>
              <div id="vtBlock"></div>
              <div id="songBlock">
                <div id="introRegion"></div>
              </div>
            </div>

            <div class="rec-bottom">
              <div class="rec-buttons">
                <button class="air-btn air-btn-green" onclick="previewVT()">PREVIEW VT</button>
                <button class="air-btn air-btn-green" onclick="previewBreak()">PREVIEW BREAK</button>
              </div>

              <div class="rec-progress">
                <div class="progress" style="position:relative;">
                  <div id="progressBar"></div>
                  <div id="secMarker"></div>
                </div>
                <span id="time">0:00</span>
              </div>
            </div>

            <div id="status"></div>

          </div>

          <audio id="player"></audio>
        </td>
      `;

      tableBody.appendChild(recorderRow);

      const rowData = filteredLog[selectedIndex];

// 🔁 Restore previous recording
const saved = recordings[rowData.cart];
if (saved) {
  const player = document.getElementById("player");

  setupPlayer(player, saved);

  recordedBlob = saved;
  document.getElementById("uploadBtn").disabled = false;
  document.getElementById("status").textContent = "VT Previously recorded";
}

// 🔁 Restore upload state
if (uploaded[rowData.cart]) {
  const btn = document.getElementById("uploadBtn");
  const status = document.getElementById("status");

  btn.textContent = "VT Uploaded ✓";
  btn.disabled = true;
  status.textContent = "✅ Already uploaded";
}

      // 🎧 INIT EVERYTHING AFTER DOM EXISTS
      setTimeout(() => {
        const vtContainer = document.getElementById("vtWaveform");
        if (!vtContainer) return;

        // 🔥 DESTROY OLD WAVEFORM
if (vtWave) {
  try {
    vtWave.destroy();
  } catch (e) {
    console.warn("Wave destroy error:", e);
  }
  vtWave = null;
}

        vtWave = WaveSurfer.create({
          container: "#vtWaveform",
          waveColor: "#facc15",
          progressColor: "#eab308",
          height: 60
        });

        const rowData = filteredLog[selectedIndex];
        if (!rowData) return;

        const { nextSong } = getPrevNextSongs(selectedIndex);

        // 🎙 Load VT
        const saved = recordings[rowData.cart];
        if (saved) {
          vtWave.load(URL.createObjectURL(saved));
        }

        // restore sec tone
        if (secTones[rowData.cart] !== undefined) {
          secToneTime = secTones[rowData.cart];
        }

        // 🎵 preload next song
        if (nextSong) {
          const songUrl = `${API_BASE}/audio/song/${encodeURIComponent(nextSong.filename)}`;
          songAudio = new Audio(songUrl);
          songAudio.preload = "auto";
        }

        vtWave.once("ready", () => {
          console.log("🔥 VT ready");
          window.isAudioReady = true;

          const vtDuration = vtWave.getDuration();
          const songDuration = 240;
          const intro = nextSong?.intro || 0;
          const secTone = secTones[rowData.cart] ?? 0;

          // 🎯 DRAW BLOCK UI
          drawBlocks(vtDuration, songDuration, intro, secTone);


          // 🖱 ENABLE DRAGGING
          setTimeout(() => {
            setupDragging();
          }, 50);
        });

      }, 50);
    }
  });
}


function checkReady() {
  console.log("🔥 VT ready");
  window.isAudioReady = true;
}



let previewAudio = null;
let currentPlayBtn = null;

function playSong(filename, btn) {
  const url = `${API_BASE}/audio/song/${encodeURIComponent(filename)}`;

  // 🔴 stop VT preview if playing
  if (isPreviewPlaying) {
    stopPreview();
  }

  // 🔁 clicking same button = stop
  if (currentPlayBtn === btn && previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    btn.textContent = "▶";
    currentPlayBtn = null;
    return;
  }

  // 🎵 stop previous audio
  if (previewAudio) {
    previewAudio.pause();
    previewAudio = null;

    if (currentPlayBtn) {
      currentPlayBtn.textContent = "▶";
    }
  }

  // ▶ start new
  previewAudio = new Audio(url);
  previewAudio.preload = "auto";
  previewAudio.play();

  btn.textContent = "⏹";

  // TRIM SILENCE ON WAV VT
function trimSilence(samples, sampleRate, threshold = 0.01, windowSize = 1024) {
  let start = 0;
  let end = samples.length - 1;

  function rms(startIdx) {
    let sum = 0;
    for (let i = 0; i < windowSize; i++) {
      const s = samples[startIdx + i] || 0;
      sum += s * s;
    }
    return Math.sqrt(sum / windowSize);
  }

  // find start
  for (let i = 0; i < samples.length - windowSize; i += windowSize) {
    if (rms(i) > threshold) {
      start = i;
      break;
    }
  }

  // find end
  for (let i = samples.length - windowSize; i > 0; i -= windowSize) {
    if (rms(i) > threshold) {
      end = i;
      break;
    }
  }

  // padding (keeps natural feel)
  const padding = sampleRate * 0.1; // 100ms

  start = Math.max(0, start - padding);
  end = Math.min(samples.length - 1, end + padding);

  return samples.slice(start, end);
}

function encodeMP3(samples, sampleRate) {
  const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128); // mono, 128 kbps
  const blockSize = 1152;

  let mp3Data = [];

  // convert Float32 → Int16
  const samples16 = new Int16Array(samples.length);
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    samples16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }

  for (let i = 0; i < samples16.length; i += blockSize) {
    const chunk = samples16.subarray(i, i + blockSize);
    const mp3buf = mp3encoder.encodeBuffer(chunk);
    if (mp3buf.length > 0) {
      mp3Data.push(mp3buf);
    }
  }

  const mp3buf = mp3encoder.flush();
  if (mp3buf.length > 0) {
    mp3Data.push(mp3buf);
  }

  return new Blob(mp3Data, { type: "audio/mpeg" });
}

async function addID3Tags(blob, row, nextSong, duration, secTone) {
  const mp3 = new Uint8Array(await blob.arrayBuffer());

  function toSynchsafe(size) {
    return [
      (size >> 21) & 0x7f,
      (size >> 14) & 0x7f,
      (size >> 7) & 0x7f,
      size & 0x7f
    ];
  }

  function writeString(view, offset, str) {
    for (let i = 0; i < str.length; i++) {
      view[offset + i] = str.charCodeAt(i);
    }
  }

  function createTXXX(desc, value) {
    const descBytes = new TextEncoder("latin1").encode(desc);
    const valueBytes = new TextEncoder("latin1").encode(value);

    const size = 1 + descBytes.length + 1 + valueBytes.length;

    const frame = new Uint8Array(10 + size);

    // Frame ID
    writeString(frame, 0, "TXXX");

    // Frame size (normal int for v2.3)
    frame[4] = (size >> 24) & 0xff;
    frame[5] = (size >> 16) & 0xff;
    frame[6] = (size >> 8) & 0xff;
    frame[7] = size & 0xff;

    // Flags
    frame[8] = 0;
    frame[9] = 0;

    // Encoding = 0 (ISO-8859-1)
    frame[10] = 0x00;

    // Description
    frame.set(descBytes, 11);

    // Null separator
    frame[11 + descBytes.length] = 0x00;

    // Value
    frame.set(valueBytes, 12 + descBytes.length);

    return frame;
  }

  // 🎯 Build frames
  const frames = [
    createTXXX("Sec Tone", secTone.toString()),
    createTXXX("Category", "AUDIO"),
    createTXXX("No fade", "0")
  ];

  const tagSize = frames.reduce((sum, f) => sum + f.length, 0);

  // 🎯 ID3 header
  const header = new Uint8Array(10);
  writeString(header, 0, "ID3");
  header[3] = 3; // v2.3
  header[4] = 0;
  header[5] = 0;

  const sizeBytes = toSynchsafe(tagSize);
  header[6] = sizeBytes[0];
  header[7] = sizeBytes[1];
  header[8] = sizeBytes[2];
  header[9] = sizeBytes[3];

  // 🎯 Combine
  const final = new Uint8Array(10 + tagSize + mp3.length);

  final.set(header, 0);

  let offset = 10;
  for (const f of frames) {
    final.set(f, offset);
    offset += f.length;
  }

  final.set(mp3, offset);

  return new Blob([final], { type: "audio/mpeg" });
}

  }

  if (!song.style.left) {
    song.style.left = (secTone * PX_PER_SEC) + "px";
  }

  // 🎙 VT LABEL
  vt.innerHTML = `
    <div class="block-label">
      🎙 ${rowData.title || "Voicetrack"}
    </div>
  `;

  // 🎵 SONG LABEL
  if (nextSong) {
    song.innerHTML = `
      <div class="block-label">
        🎵 ${nextSong.artist || ""} - ${nextSong.title || ""}
      </div>
    `;
  }

  // store intro
  song.dataset.intro = intro;
}


function updateSecToneFromBlocks() {
  const vtBlock = document.getElementById("vtBlock");
  const songBlock = document.getElementById("songBlock");

  if (!vtBlock || !songBlock) return;

  const vtRight = vtBlock.offsetLeft + vtBlock.offsetWidth;
  const songLeft = songBlock.offsetLeft;

  // 🎯 absolute sec tone (NOT incremental)
  let newSecTone = (songLeft - vtBlock.offsetLeft) / PX_PER_SEC;

  newSecTone = Math.max(0, newSecTone);

  const rowData = filteredLog[selectedIndex];

  secToneTime = newSecTone;
  secTones[rowData.cart] = newSecTone;

  console.log("🎯 NEW ABSOLUTE Sec Tone:", newSecTone.toFixed(2));

  redrawBlocks();
}

function redrawBlocks() {
  const rowData = filteredLog[selectedIndex];
  const { nextSong } = getPrevNextSongs(selectedIndex);

  if (!vtWave || !nextSong) return;

  const vtDuration = vtWave.getDuration();
  const intro = nextSong.intro || 0;

  drawBlocks(vtDuration, 240, intro, secToneTime);
}

function updatePlayhead() {
  const playhead = document.getElementById("playhead");
  if (!playhead) return;

  let time = 0;

  // 🎙 VT playing
  if (vtWave && vtWave.isPlaying()) {
    time = vtWave.getCurrentTime();
  }

  // 🎵 SONG playing AFTER VT
  else if (songAudio && !songAudio.paused) {
    time = (secToneTime || 0) + songAudio.currentTime;
  }

  const x = time * PX_PER_SEC;
  playhead.style.left = x + "px";

  requestAnimationFrame(updatePlayhead);
}


function calculateSecTone() {
  const vtBlock = document.getElementById("vtBlock");
  const songBlock = document.getElementById("songBlock");

  if (!vtBlock || !songBlock) return;

  const vtLeft = vtBlock.offsetLeft;
  const markerOffset = secToneTime * PX_PER_SEC;

  const intro = parseFloat(songBlock.dataset.intro || 0);

  const songStart = songBlock.offsetLeft;
  const introEnd = songStart + (intro * PX_PER_SEC);

  const diff = introEnd - (vtLeft + markerOffset);

  const newSecTone = secToneTime + (diff / PX_PER_SEC);

  return newSecTone;
}

function setupDragging() {
  const vtBlock = document.getElementById("vtBlock");
  const songBlock = document.getElementById("songBlock");
  const editor = document.getElementById("vtEditor");

  if (!vtBlock || !songBlock || !editor) return;

  makeDraggable(vtBlock);
  makeDraggable(songBlock);

  function makeDraggable(el) {
    const editor = document.getElementById("vtEditor");
    if (!editor) return;

    let isDragging = false;

    function onMouseMove(e) {
      if (!isDragging) return;

      const rect = editor.getBoundingClientRect();
      let x = e.clientX - rect.left;

      x = Math.max(0, Math.min(x, editor.offsetWidth - el.offsetWidth));
      el.style.left = x + "px";
    }

    function onMouseUp() {
      if (!isDragging) return;

      isDragging = false;
      el.style.cursor = "grab";

      updateSecToneFromBlocks();

      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    }

    el.onmousedown = (e) => {
      isDragging = true;
      el.style.cursor = "grabbing";

      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);

      e.preventDefault();
    };
  }

} // ✅ THIS WAS MISSING
